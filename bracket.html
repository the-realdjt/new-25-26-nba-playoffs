<!DOCTYPE html>

        .bg-glow::after {

        .container { position: relative; z-index: 1; max-width: 1800px; margin: 0 auto; padding: 20px; }

        header::after {

        .hint-badge {

            background: linear-gradient(135deg, rgba(201,8,42,0.15), rgba(23,64,139,0.15));
            border: 1px solid rgba(201,8,42,0.3); border-radius: 20px;

        .tabs { display: flex; justify-content: center; gap: 10px; margin: 24px 0 16px; }

        @keyframes confettiFall {

        .reset-btn {
            display: block; margin: 20px auto; padding: 10px 30px;
            background: transparent; border: 1px solid #333; color: #666;
            border-radius: 8px; cursor: pointer; font-size: 0.85rem;
            font-family: 'Noto Sans SC', sans-serif; transition: all 0.3s;
        }
        .reset-btn:hover { border-color: #c9082a; color: #fff; }

        .standings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-top: 16px; }
        .conf-table {
            background: linear-gradient(145deg, #111114, #16161a);
            border-radius: 14px; overflow: hidden; border: 1px solid #1e1e22;
        }
        .conf-table-header {
            padding: 16px; text-align: center; font-family: 'Orbitron', sans-serif;

        }
        .conf-table-header.west { background: linear-gradient(135deg, #c9082a, #e03050); }
        .conf-table-header.east { background: linear-gradient(135deg, #17408b, #1a5bc4); }
        .s-table { width: 100%; border-collapse: collapse; }
        .s-table th { padding: 10px 14px; text-align: left; color: #555; font-size: 0.7rem; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; border-bottom: 1px solid #1e1e22; }

        .team-info { display: flex; align-items: center; gap: 8px; font-weight: 600; }
        .team-dot-sm { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
        .divider-playin td { padding: 6px 14px; background: rgba(45,90,30,0.08); color: #4ade80; font-size: 0.7rem; font-weight: 600; letter-spacing: 2px; text-align: center; }

    </style>
</head>

<script>

const SUPABASE_URL = "https://mqgmvpwweqviwyccjmdj.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1xZ212cHd3ZXF2aXd5Y2NqbWRqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyODk2NjEsImV4cCI6MjA5Mzg2NTY2MX0.pV6r_eG865nEJv83-p-0bWkW3H5_jgowAsjgH1s7rAU";
// ============================================================

const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
let currentUser = null;
let selections = {};

// 页面加载先检测登录状态 + 自动加载历史预测
document.addEventListener('DOMContentLoaded', async () => {
    const { data: { session } } = await supabaseClient.auth.getSession();
    if (!session) {
        location.href = "index.html";
        return;
    }
    currentUser = session.user;
    // 开启会话持久化，防止几分钟掉线
    supabaseClient.auth.setPersistence('local');
    await loadUserBracket();
});

// 退出登录
async function logout(){
    await supabaseClient.auth.signOut();
    location.href = "index.html";
}

// 从数据库加载历史预测
async function loadUserBracket(){
    try {
        const { data } = await supabaseClient
            .from("user_brackets")
            .select("selections")
            .eq("user_id", currentUser.id)
            .single();

        if (data?.selections) {
            selections = data.selections;
        } else {
            selections = {};
        }
        renderBracket();
    } catch (e) {
        selections = {};
        renderBracket();
    }
}

// 自动保存到云端（每次选队伍都会触发）
async function saveUserBracket(){
    if (!currentUser) return;
    try {
        await supabaseClient
            .from("user_brackets")
            .upsert([
                { user_id: currentUser.id, selections: selections }
            ], { onConflict: 'user_id' });
    } catch (err) {
        console.error("保存失败", err);
    }
}

// 球队数据

];

const west8 = westTeams.slice(0,8);
const east8 = eastTeams.slice(0,8);

function mid(conf, round, m) { return conf + 'R' + round + 'M' + m; }

function getMatchups(conf, round) {
    const t = conf === 'W' ? west8 : east8;
    if (round === 1) {
        return [[t[0],t[7]], [t[1],t[6]], [t[2],t[5]], [t[3],t[4]]];
    }
    const prev = getMatchups(conf, round - 1);
    if (!prev) return null;
    const winners = [];
    for (let i = 0; i < prev.length; i++) {
        const s = selections[mid(conf, round-1, i)];
        if (!s) return null;
        winners.push(s === 'H' ? prev[i][0] : prev[i][1]);
    }
    const res = [];
    for (let i = 0; i < winners.length; i += 2) {
        if (i + 1 < winners.length) res.push([winners[i], winners[i+1]]);
    }
    return res;
}

function getFinalsTeams() {
    const w = getMatchups('W', 3), e = getMatchups('E', 3);
    if (!w || !e) return null;
    const ws = selections[mid('W',3,0)], es = selections[mid('E',3,0)];
    if (!ws || !es) return null;
    return [ws === 'H' ? w[0][0] : w[0][1], es === 'H' ? e[0][0] : e[0][1]];
}

function teamHTML(team, matchId, side) {
    const isSel = selections[matchId] === side;
    let cls = 'team-row';
    if (isSel) cls += ' selected';
    return `<div class="${cls}" onclick="pick('${matchId}','${side}')">
        <span class="seed-badge">${team.seed}</span>
        <span class="team-dot" style="background:${team.color}"></span>
        <span class="tname">${team.name}</span>
        <span class="trecord">${team.w}-${team.l}</span>
        <span class="win-check">✓</span>
    </div>`;
}

function emptyTeamHTML() {
    return `<div class="team-row empty">
        <span class="seed-badge">?</span>
        <span class="team-dot" style="background:#333"></span>
        <span class="tname">等待胜者</span>
        <span class="trecord">-</span>
    </div>`;
}

function matchupHTML(pair, matchId) {
    let html = '<div class="matchup">';
    html += teamHTML(pair[0], matchId, 'H');
    html += teamHTML(pair[1], matchId, 'L');
    html += '</div>';
    return html;
}

function emptyMatchupHTML() {
    return `<div class="matchup">${emptyTeamHTML()}${emptyTeamHTML()}</div>`;
}

function roundLabel(r) {
    return r===1 ? '首轮' : r===2 ? '半决赛' : '分区决赛';
}

function renderBracket() {
    const el = document.getElementById('bracket-main');
    let html = '';

    html += '<div class="conf-side west"><div class="conf-label west">西部</div>';
    for (let r = 1; r <= 3; r++) {
        html += '<div class="conn"><div class="conn-line"></div></div>';
        html += `<div class="round-col r${r}"><div class="round-label">${roundLabel(r)}</div>`;
        const ms = getMatchups('W', r);
        const cnt = r===1 ? 4 : r===2 ? 2 : 1;
        for (let i = 0; i < cnt; i++) {
            const midKey = mid('W', r, i);
            if (ms && ms[i]) {
                html += matchupHTML(ms[i], midKey);
            } else {
                html += emptyMatchupHTML();
            }
        }
        html += '</div>';
    }
    html += '</div>';

    const ft = getFinalsTeams();
    const fsSel = selections['FINALS'];
    html += '<div class="finals-zone"><div class="conn"><div class="conn-line"></div></div>';
    html += `<div class="finals-card ${fsSel ? 'complete' : ''}">
        <div class="finals-header">NBA 总决赛</div>`;
    if (ft) {
        const wCls = fsSel==='W' ? 'finals-team selected' : 'finals-team';
        const eCls = fsSel==='E' ? 'finals-team selected' : 'finals-team';
        html += `<div class="${wCls}" onclick="pickFinals('W')">
            <span class="team-dot" style="background:${ft[0].color}"></span>
            <span class="tname">${ft[0].name}</span>
            <span class="win-check">👑</span>
        </div>
        <div class="finals-vs">VS</div>
        <div class="${eCls}" onclick="pickFinals('E')">
            <span class="team-dot" style="background:${ft[1].color}"></span>
            <span class="tname">${ft[1].name}</span>
            <span class="win-check">👑</span>
        </div>`;
    } else {
        html += `${emptyTeamHTML()}<div class="finals-vs">VS</div>${emptyTeamHTML()}`;
    }
    html += '</div></div>';

    html += '<div class="conf-side east"><div class="conf-label east">东部</div>';
    for (let r = 1; r <= 3; r++) {
        html += '<div class="conn"><div class="conn-line"></div></div>';
        html += `<div class="round-col r${r}"><div class="round-label">${roundLabel(r)}</div>`;
        const ms = getMatchups('E', r);
        const cnt = r===1 ? 4 : r===2 ? 2 : 1;
        for (let i = 0; i < cnt; i++) {
            const midKey = mid('E', r, i);
            if (ms && ms[i]) {
                html += matchupHTML(ms[i], midKey);
            } else {
                html += emptyMatchupHTML();
            }
        }
        html += '</div>';
    }
    html += '</div>';

    el.innerHTML = html;
    updateProgress();
}

// 选队伍 - 选完自动保存
function pick(matchId, side) {
    if (selections[matchId] === side) {
        delete selections[matchId];
    } else {
        selections[matchId] = side;
    }
    renderBracket();
    saveUserBracket();
}

// 选总冠军 - 选完自动保存
function pickFinals(side) {
    if (selections['FINALS'] === side) {
        delete selections['FINALS'];
    } else {
        selections['FINALS'] = side;
    }
    renderBracket();
    saveUserBracket();

    const ft = getFinalsTeams();
    if (ft) {
        const champ = side==='W' ? ft[0] : ft[1];
        document.getElementById('champion-name').innerText = champ.name;
        document.getElementById('champion-detail').innerText = `${champ.abbr} · ${champ.w}胜${champ.l}负`;
        document.getElementById('champion-reveal').classList.add('show');
        createConfetti();
    }
}

// 重置所有预测
function resetBracket() {
    if (!confirm('确定要清空所有预测吗？不可恢复！')) return;
    selections = {};
    renderBracket();
    saveUserBracket();
}

function closeChampion() {
    document.getElementById('champion-reveal').classList.remove('show');
    document.getElementById('confetti-container').innerHTML = '';
}

function createConfetti() {
    const container = document.getElementById('confetti-container');
    const colors = ['#ffd700','#c9082a','#17408b','#ff4d6a','#4ade80','#fff'];
    for (let i = 0; i < 120; i++) {
        const el = document.createElement('div');
        el.className = 'confetti';
        el.style.left = Math.random()*100 + '%';
        el.style.width = (Math.random()*8+4) + 'px';
        el.style.height = (Math.random()*8+4) + 'px';
        el.style.background = colors[Math.floor(Math.random()*colors.length)];
        el.style.animationDuration = (Math.random()*3+2) + 's';
        container.appendChild(el);
    }
}

function updateProgress() {
    const total = 15;
    const done = Object.keys(selections).length;
    document.getElementById('progress-num').innerText = done;
    document.getElementById('progress-bar-fill').style.width = (done/total*100) + '%';
}

function switchTab(tab) {
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    event.target.classList.add('active');
    document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
    document.getElementById('sec-'+tab).classList.add('active');
}

function renderStandings(teams, tableId) {
    const tbl = document.getElementById(tableId);
    let html = `<thead><tr><th>排名</th><th>球队</th><th>战绩</th><th>胜率</th></tr></thead><tbody>`;
    teams.forEach((t, idx) => {
        let rankCls = 'rank-badge ';
        if (t.seed <=6) rankCls += 'r1-6';
        else if (t.seed <=10) rankCls += 'r7-10';
        else rankCls += 'r11-15';

        if (t.seed ===7) html += `<tr class="divider-playin"><td colspan="4">附加赛区域 7-10名</td></tr>`;
        if (t.seed ===11) html += `<tr class="divider-out"><td colspan="4">无缘季后赛</td></tr>`;

        html += `<tr>
            <td><span class="${rankCls}">${t.seed}</span></td>
            <td><div class="team-info"><span class="team-dot-sm" style="background:${t.color}"></span>${t.name}</div></td>
            <td style="color:#aaa">${t.w}-${t.l}</td>
            <td class="pct">${t.pct}</td>
        </tr>`;
    });
    html += '</tbody>';
    tbl.innerHTML = html;
}

renderStandings(westTeams, 'west-table');
renderStandings(eastTeams, 'east-table');
</script>
