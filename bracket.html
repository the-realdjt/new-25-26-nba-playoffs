<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NBA 2025-26 季后赛预测</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #0a0a0f; color: #fff; min-height: 100vh; }
        .container { max-width: 1800px; margin: 0 auto; padding: 20px; }
        header { text-align: center; padding: 20px 0; border-bottom: 1px solid #333; }
        h1 { font-size: 1.8rem; margin-bottom: 10px; }
        .tabs { display: flex; justify-content: center; gap: 10px; margin: 20px 0; }
        .tab { padding: 10px 20px; border: 1px solid #333; background: transparent; color: #fff; cursor: pointer; border-radius: 5px; }
        .tab.active { background: #c9082a; border-color: #c9082a; }
        .section { display: none; }
        .section.active { display: block; }
        .bracket-wrapper { overflow-x: auto; padding: 20px 0; }
        .bracket-main { display: flex; align-items: center; justify-content: center; min-width: 1200px; gap: 20px; }
        .conf-side { display: flex; align-items: center; }
        .conf-side.east { flex-direction: row-reverse; }
        .conf-label { writing-mode: vertical-rl; text-orientation: mixed; padding: 10px; background: #c9082a; border-radius: 5px; margin: 0 10px; }
        .conf-side.east .conf-label { background: #17408b; }
        .round-col { display: flex; flex-direction: column; gap: 15px; }
        .matchup { width: 200px; background: #1a1a2e; border: 1px solid #333; border-radius: 8px; overflow: hidden; }
        .team-row { padding: 10px; cursor: pointer; border-bottom: 1px solid #333; }
        .team-row:last-child { border-bottom: none; }
        .team-row.selected { background: rgba(201,8,42,0.2); border-left: 3px solid #c9082a; }
        .finals-zone { display: flex; flex-direction: column; align-items: center; }
        .finals-card { width: 220px; background: #1a1a2e; border: 2px solid #ffd700; border-radius: 10px; overflow: hidden; }
        .finals-header { padding: 10px; background: #ffd700; color: #000; text-align: center; font-weight: bold; }
        .finals-team { padding: 15px; cursor: pointer; border-bottom: 1px solid #333; }
        .finals-team:last-child { border-bottom: none; }
        .finals-team.selected { background: rgba(255,215,0,0.2); border-left: 3px solid #ffd700; }
        .reset-btn { display: block; margin: 20px auto; padding: 10px 30px; background: transparent; border: 1px solid #333; color: #fff; border-radius: 5px; cursor: pointer; }
        .reset-btn:hover { border-color: #c9082a; }
        .standings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .conf-table { background: #1a1a2e; border-radius: 10px; overflow: hidden; border: 1px solid #333; }
        .conf-table-header { padding: 15px; text-align: center; font-weight: bold; }
        .conf-table-header.west { background: #c9082a; }
        .conf-table-header.east { background: #17408b; }
        .s-table { width: 100%; border-collapse: collapse; }
        .s-table th, .s-table td { padding: 10px; text-align: left; border-bottom: 1px solid #333; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>NBA 2025-26 季后赛预测</h1>
            <button class="reset-btn" onclick="logout()">🚪 退出登录</button>
        </header>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('bracket')">季后赛对阵图</button>
            <button class="tab" onclick="switchTab('standings')">常规赛排名</button>
        </div>

        <div class="section active" id="sec-bracket">
            <div class="bracket-wrapper">
                <div class="bracket-main" id="bracket-main"></div>
            </div>
            <button class="reset-btn" onclick="resetBracket()">🔄 重置所有预测</button>
        </div>

        <div class="section" id="sec-standings">
            <div class="standings-grid">
                <div class="conf-table">
                    <div class="conf-table-header west">西部联盟 WEST</div>
                    <table class="s-table" id="west-table"></table>
                </div>
                <div class="conf-table">
                    <div class="conf-table-header east">东部联盟 EAST</div>
                    <table class="s-table" id="east-table"></table>
                </div>
            </div>
        </div>
    </div>

<script>

// ================= Supabase =================

const SUPABASE_URL =
"https://mqgmvpwweqviwyccjmdj.supabase.co";

const SUPABASE_KEY =
"你的真实anon key";

const supabaseClient =
window.supabase.createClient(
    SUPABASE_URL,
    SUPABASE_KEY
);

let currentUser = null;

let selections = {};


// ================= 页面初始化 =================

document.addEventListener(
    'DOMContentLoaded',
    async ()=>{

    const { data, error } =
    await supabaseClient.auth.getSession();

    if(error || !data.session){

        location.href = "index.html";
        return;

    }

    currentUser = data.session.user;

    console.log(
        "当前用户:",
        currentUser.email
    );

    await loadUserBracket();

    renderStandings(
        westTeams,
        'west-table'
    );

    renderStandings(
        eastTeams,
        'east-table'
    );

});


// ================= 退出登录 =================

async function logout(){

    await supabaseClient.auth.signOut();

    location.href = "index.html";

}


// ================= 加载历史预测 =================

async function loadUserBracket(){

    try{

        const { data, error } =
        await supabaseClient
            .from("user_brackets")
            .select("selections")
            .eq("user_id", currentUser.id)
            .maybeSingle();

        if(error){

            console.error(error);

            selections = {};

        }else{

            selections =
                data?.selections || {};

        }

        renderBracket();

    }catch(err){

        console.error(err);

        selections = {};

        renderBracket();

    }

}


// ================= 自动保存 =================

async function saveUserBracket(){

    try{

        const { error } =
        await supabaseClient
            .from("user_brackets")
            .upsert([

            {
                user_id: currentUser.id,
                selections: selections,
                updated_at:
                    new Date().toISOString()
            }

        ],{

            onConflict:'user_id'

        });

        if(error){

            console.error(error);

        }else{

            console.log("自动保存成功");

        }

    }catch(err){

        console.error(err);

    }

}


// ================= 球队数据 =================

const westTeams = [
    { seed:1, name:'俄克拉荷马城雷霆', w:64, l:18 },
    { seed:2, name:'圣安东尼奥马刺', w:62, l:20 },
    { seed:3, name:'丹佛掘金', w:54, l:28 },
    { seed:4, name:'洛杉矶湖人', w:53, l:29 },
    { seed:5, name:'休斯顿火箭', w:52, l:30 },
    { seed:6, name:'明尼苏达森林狼', w:49, l:33 },
    { seed:7, name:'波特兰开拓者', w:42, l:40 },
    { seed:8, name:'菲尼克斯太阳', w:45, l:37 },
];

const eastTeams = [
    { seed:1, name:'底特律活塞', w:60, l:22 },
    { seed:2, name:'波士顿凯尔特人', w:56, l:26 },
    { seed:3, name:'纽约尼克斯', w:53, l:29 },
    { seed:4, name:'克利夫兰骑士', w:52, l:30 },
    { seed:5, name:'多伦多猛龙', w:46, l:36 },
    { seed:6, name:'亚特兰大老鹰', w:46, l:36 },
    { seed:7, name:'费城76人', w:45, l:37 },
    { seed:8, name:'奥兰多魔术', w:45, l:37 },
];


// ================= 工具函数 =================

function mid(conf, round, m){

    return conf + 'R' + round + 'M' + m;

}


// ================= 获取对阵 =================

function getMatchups(conf, round){

    const t =
    conf === 'W'
        ? westTeams
        : eastTeams;

    if(round === 1){

        return [

            [t[0], t[7]],
            [t[1], t[6]],
            [t[2], t[5]],
            [t[3], t[4]]

        ];

    }

    const prev =
    getMatchups(conf, round - 1);

    const winners = [];

    for(let i=0;i<prev.length;i++){

        const pick =
        selections[
            mid(conf, round-1, i)
        ];

        if(pick){

            winners.push(

                pick === 'H'
                    ? prev[i][0]
                    : prev[i][1]

            );

        }else{

            winners.push(null);

        }

    }

    const res = [];

    for(let i=0;i<winners.length;i+=2){

        if(
            winners[i]
            &&
            winners[i+1]
        ){

            res.push([
                winners[i],
                winners[i+1]
            ]);

        }else{

            res.push(null);

        }

    }

    return res;

}


// ================= HTML =================

function matchupHTML(pair, matchId){

    if(!pair){

        return `
        <div class="matchup">
            <div class="team-row">等待胜者</div>
            <div class="team-row">等待胜者</div>
        </div>
        `;
    }

    return `
    <div class="matchup">

        <div
            class="team-row ${
                selections[matchId]==='H'
                ? 'selected'
                : ''
            }"

            onclick="pick('${matchId}','H')"
        >

            ${pair[0].seed}.
            ${pair[0].name}

            (${pair[0].w}-${pair[0].l})

        </div>

        <div
            class="team-row ${
                selections[matchId]==='L'
                ? 'selected'
                : ''
            }"

            onclick="pick('${matchId}','L')"
        >

            ${pair[1].seed}.
            ${pair[1].name}

            (${pair[1].w}-${pair[1].l})

        </div>

    </div>
    `;
}


// ================= 渲染对阵图 =================

function renderBracket(){

    const el =
    document.getElementById(
        'bracket-main'
    );

    let html = '';

    // 西部

    html += `
    <div class="conf-side">

        <div class="conf-label">
            WEST
        </div>
    `;

    for(let r=1;r<=3;r++){

        html += `
        <div class="round-col">
        `;

        const ms =
        getMatchups('W', r);

        const cnt =
            r===1 ? 4 :
            r===2 ? 2 : 1;

        for(let i=0;i<cnt;i++){

            html += matchupHTML(
                ms[i],
                mid('W',r,i)
            );

        }

        html += `
        </div>
        `;
    }

    html += `
    </div>
    `;


    // 总决赛

    const westFinal =
    getMatchups('W',3)[0];

    const eastFinal =
    getMatchups('E',3)[0];

    html += `
    <div class="finals-zone">

        <div class="finals-card">

            <div class="finals-header">
                NBA FINALS
            </div>
    `;

    if(westFinal && eastFinal){

        const westTeam =
            selections['WR3M0']==='H'
            ? westFinal[0]
            : westFinal[1];

        const eastTeam =
            selections['ER3M0']==='H'
            ? eastFinal[0]
            : eastFinal[1];

        html += `

        <div
            class="finals-team ${
                selections['FINALS']==='W'
                ? 'selected'
                : ''
            }"

            onclick="pickFinals('W')"
        >

            ${westTeam.name}

        </div>

        <div
            class="finals-team ${
                selections['FINALS']==='E'
                ? 'selected'
                : ''
            }"

            onclick="pickFinals('E')"
        >

            ${eastTeam.name}

        </div>
        `;

    }else{

        html += `
        <div class="finals-team">
            等待分区冠军
        </div>
        `;

    }

    html += `
        </div>
    </div>
    `;


    // 东部

    html += `
    <div class="conf-side east">

        <div class="conf-label">
            EAST
        </div>
    `;

    for(let r=1;r<=3;r++){

        html += `
        <div class="round-col">
        `;

        const ms =
        getMatchups('E', r);

        const cnt =
            r===1 ? 4 :
            r===2 ? 2 : 1;

        for(let i=0;i<cnt;i++){

            html += matchupHTML(
                ms[i],
                mid('E',r,i)
            );

        }

        html += `
        </div>
        `;
    }

    html += `
    </div>
    `;

    el.innerHTML = html;

}


// ================= 选择球队 =================

function pick(matchId, side){

    selections[matchId] = side;

    renderBracket();

    saveUserBracket();

}


// ================= 选择总冠军 =================

function pickFinals(side){

    selections['FINALS'] = side;

    renderBracket();

    saveUserBracket();

}


// ================= 重置 =================

async function resetBracket(){

    if(
        !confirm("确定清空预测吗？")
    ){
        return;
    }

    selections = {};

    renderBracket();

    await saveUserBracket();

}


// ================= standings =================

function renderStandings(teams, tableId){

    const tbl =
    document.getElementById(tableId);

    let html =
    `
    <thead>
        <tr>
            <th>排名</th>
            <th>球队</th>
            <th>战绩</th>
        </tr>
    </thead>
    <tbody>
    `;

    teams.forEach(t=>{

        html += `
        <tr>

            <td>${t.seed}</td>

            <td>${t.name}</td>

            <td>${t.w}-${t.l}</td>

        </tr>
        `;

    });

    html += `
    </tbody>
    `;

    tbl.innerHTML = html;

}


// ================= tab =================

function switchTab(tab){

    document
        .querySelectorAll('.tab')
        .forEach(t=>
            t.classList.remove('active')
        );

    event.target.classList.add('active');

    document
        .querySelectorAll('.section')
        .forEach(s=>
            s.classList.remove('active')
        );

    document
        .getElementById(
            'sec-' + tab
        )
        .classList.add('active');

}

</script>
</body>
</html>
