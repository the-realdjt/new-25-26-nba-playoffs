<!DOCTYPE html>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Noto Sans SC',sans-serif;
    background:#0a0a0f;
    color:#fff;
    min-height:100vh;
    overflow-x:hidden;
}

.bg-glow{
    position:fixed;
    inset:0;
    z-index:0;
    pointer-events:none;
}

.bg-glow::before{
    content:'';
    position:absolute;
    top:-30%;
    left:-10%;
    width:50%;
    height:60%;
    background:radial-gradient(circle,rgba(201,8,42,0.08) 0%,transparent 70%);
}

.bg-glow::after{
    content:'';
    position:absolute;
    bottom:-30%;
    right:-10%;
    width:50%;
    height:60%;
    background:radial-gradient(circle,rgba(23,64,139,0.08) 0%,transparent 70%);
}

.container{
    position:relative;
    z-index:1;
    max-width:1800px;
    margin:0 auto;
    padding:20px;
}

header{
    text-align:center;
    padding:30px 0 20px;
    position:relative;
}

header::after{
    content:'';
    position:absolute;
    bottom:0;
    left:50%;
    transform:translateX(-50%);
    width:300px;
    height:2px;
    background:linear-gradient(
        90deg,
        transparent,
        #c9082a,
        #17408b,
        transparent
    );
}

.logo-area{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:16px;
    margin-bottom:8px;
}

.nba-logo{
    width:56px;
    height:56px;
    border-radius:50%;
    background:linear-gradient(135deg,#c9082a,#8b0620);
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'Orbitron',sans-serif;
    font-weight:900;
    font-size:14px;
    box-shadow:0 0 25px rgba(201,8,42,.4);
}

h1{
    font-family:'Orbitron',sans-serif;
    font-size:2rem;
    letter-spacing:3px;
    background:linear-gradient(135deg,#fff,#c9082a);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.subtitle{
    color:#777;
    margin-top:6px;
}

.hint-badge{
    display:inline-block;
    margin-top:12px;
    padding:6px 20px;
    border-radius:20px;
    background:linear-gradient(135deg,rgba(201,8,42,.15),rgba(23,64,139,.15));
    border:1px solid rgba(201,8,42,.25);
    font-size:.8rem;
    color:#aaa;
}

.tabs{
    display:flex;
    justify-content:center;
    gap:10px;
    margin:24px 0 16px;
}

.tab{
    padding:10px 24px;
    border-radius:8px;
    border:1px solid #222;
    background:transparent;
    color:#777;
    cursor:pointer;
    transition:.25s;
}

.tab:hover{
    border-color:#c9082a;
    color:#fff;
}

.tab.active{
    background:linear-gradient(135deg,#c9082a,#8b0620);
    border-color:#c9082a;
    color:#fff;
}

.section{
    display:none;
}

.section.active{
    display:block;
}

.progress-bar{
    max-width:500px;
    margin:10px auto;
    padding:8px 16px;
    background:#141418;
    border-radius:10px;
    border:1px solid #222;
}

.progress-text{
    font-size:.75rem;
    color:#777;
    text-align:center;
    margin-bottom:6px;
}

.progress-track{
    width:100%;
    height:4px;
    background:#222;
    border-radius:2px;
    overflow:hidden;
}

.progress-fill{
    height:100%;
    width:0%;
    transition:.35s;
    background:linear-gradient(90deg,#c9082a,#ffd700);
}

.bracket-wrapper{
    overflow-x:auto;
    padding:10px 0;
}

.bracket-main{
    display:flex;
    align-items:center;
    justify-content:center;
    min-width:1400px;
    min-height:680px;
}

.conf-side{
    display:flex;
    align-items:center;
}

.conf-side.east{
    flex-direction:row-reverse;
}

.conf-label{
    writing-mode:vertical-rl;
    text-orientation:mixed;
    padding:8px 14px;
    border-radius:20px;
    font-size:.7rem;
    letter-spacing:3px;
    font-family:'Orbitron',sans-serif;
}

.conf-label.west{
    background:linear-gradient(135deg,#c9082a,#e03050);
}

.conf-label.east{
    background:linear-gradient(135deg,#17408b,#1a5bc4);
}

.round-col{
    display:flex;
    flex-direction:column;
    justify-content:center;
}

.round-col.r1{gap:14px;}
.round-col.r2{gap:54px;}
.round-col.r3{gap:120px;}

.round-label{
    text-align:center;
    font-size:.65rem;
    letter-spacing:2px;
    color:#555;
    margin-bottom:10px;
}

.conn{
    width:26px;
    display:flex;
    align-items:center;
    justify-content:center;
}

.conn-line{
    width:100%;
    height:1px;
    background:#2a2a2e;
}

.matchup{
    width:220px;
    background:linear-gradient(145deg,#131316,#18181c);
    border:1px solid #252528;
    border-radius:12px;
    overflow:hidden;
    transition:.25s;
}

.matchup:hover{
    border-color:rgba(201,8,42,.35);
    box-shadow:0 0 15px rgba(201,8,42,.08);
}

.team-row{
    display:flex;
    align-items:center;
    gap:8px;
    padding:10px 12px;
    cursor:pointer;
    transition:.25s;
    border-left:3px solid transparent;
}

.team-row:first-child{
    border-bottom:1px solid #1d1d20;
}

.team-row:hover{
    background:rgba(255,255,255,.03);
}

.team-row.selected{
    background:rgba(201,8,42,.12);
    border-left-color:#c9082a;
}

.team-row.empty{
    cursor:default;
    opacity:.35;
}

.seed-badge{
    width:22px;
    height:22px;
    border-radius:4px;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#222;
    color:#666;
    font-size:.72rem;
    font-weight:700;
}

.team-row.selected .seed-badge{
    background:#c9082a;
    color:#fff;
}

.team-dot{
    width:8px;
    height:8px;
    border-radius:50%;
}

.tname{
    flex:1;
    font-size:.82rem;
    font-weight:600;
}

.trecord{
    font-size:.65rem;
    color:#666;
}

.win-check{
    opacity:0;
    color:#ffd700;
    transition:.25s;
}

.team-row.selected .win-check{
    opacity:1;
}

.finals-zone{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:0 12px;
}

.finals-card{
    width:240px;
    background:linear-gradient(145deg,#131316,#18181c);
    border:2px solid #333;
    border-radius:14px;
    overflow:hidden;
}

.finals-card.complete{
    border-color:#ffd700;
    box-shadow:0 0 30px rgba(255,215,0,.2);
}

.finals-header{
    padding:12px;
    text-align:center;
    background:linear-gradient(135deg,#ffd700,#ff8c00);
    color:#000;
    font-family:'Orbitron',sans-serif;
    font-size:.7rem;
    font-weight:700;
    letter-spacing:3px;
}

.finals-team{
    display:flex;
    align-items:center;
    gap:10px;
    padding:16px 14px;
    cursor:pointer;
    transition:.25s;
    border-left:3px solid transparent;
}

.finals-team + .finals-team{
    border-top:1px solid #1d1d20;
}

.finals-team:hover{
    background:rgba(255,255,255,.03);
}

.finals-team.selected{
    background:rgba(255,215,0,.1);
    border-left-color:#ffd700;
}

.finals-vs{
    text-align:center;
    font-size:.65rem;
    color:#555;
    padding:4px;
    letter-spacing:2px;
}

/* 冠军弹窗特效样式 */
.champion-modal {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.85);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    backdrop-filter: blur(10px);
}
.champion-modal.show {
    display: flex;
    animation: fadeIn 0.4s forwards;
}
@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}
.champion-box {
    text-align: center;
    animation: pop 0.6s cubic-bezier(0.165, 0.84, 0.44, 1) forwards;
}
@keyframes pop {
    from { transform: scale(0.5); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}
.champion-trophy {
    font-size: 5rem;
    margin-bottom: 10px;
}
.champion-title {
    font-size: 1.2rem;
    color: #ffd700;
    letter-spacing: 4px;
    font-weight: 700;
}
.champion-team {
    font-size: 2.2rem;
    font-weight: 900;
    color: #fff;
    margin: 10px 0;
}
.champion-record {
    color: #aaa;
    font-size: 0.9rem;
}
.champion-close {
    margin-top: 20px;
    padding: 10px 25px;
    background: #ffd700;
    color: #000;
    border: none;
    border-radius: 8px;
    font-weight: 700;
    cursor: pointer;
}
.confetti {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 9998;
}

.reset-btn{
    display:block;
    margin:20px auto;
    padding:10px 30px;
    border-radius:8px;
    border:1px solid #333;
    background:transparent;
    color:#888;
    cursor:pointer;
    transition:.25s;
}
.reset-btn:hover{
    border-color:#c9082a;
    color:#fff;
}

.standings-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:24px;
    margin-top:18px;
}

.conf-table{
    background:linear-gradient(145deg,#111114,#16161a);
    border-radius:14px;
    overflow:hidden;
    border:1px solid #1e1e22;
}

.conf-table-header{
    padding:16px;
    text-align:center;
    font-family:'Orbitron',sans-serif;
    letter-spacing:3px;
    font-weight:700;
}
.conf-table-header.west{background:linear-gradient(135deg,#c9082a,#e03050);}
.conf-table-header.east{background:linear-gradient(135deg,#17408b,#1a5bc4);}

.s-table{width:100%;border-collapse:collapse;}
.s-table th{padding:10px 14px;text-align:left;color:#666;border-bottom:1px solid #1e1e22;font-size:.72rem;}
.s-table td{padding:10px 14px;border-bottom:1px solid #151518;font-size:.85rem;}

.rank-badge{
    width:24px;height:24px;border-radius:5px;
    display:inline-flex;align-items:center;justify-content:center;
    font-weight:700;font-size:.75rem;
}
.rank-badge.r1-6{background:#c9082a;}
.rank-badge.r7-10{background:#2d5a1e;}
.rank-badge.r11-15{background:#1d1d20;color:#666;}

.team-info{display:flex;align-items:center;gap:8px;font-weight:600;}
.team-dot-sm{width:6px;height:6px;border-radius:50%;}

.divider-playin td{background:rgba(45,90,30,.08);color:#4ade80;text-align:center;font-size:.72rem;}
.divider-out td{background:rgba(100,100,100,.05);color:#555;text-align:center;font-size:.72rem;}
.pct{color:#c9082a;font-weight:600;}

@media(max-width:900px){
    .standings-grid{grid-template-columns:1fr;}
    h1{font-size:1.4rem;}
}
</style>
</head>

const west8 = westTeams.slice(0,8);
const east8 = eastTeams.slice(0,8);

// 初始化
document.addEventListener('DOMContentLoaded', async ()=>{
    const {data:{session}} = await supabaseClient.auth.getSession();
    if(!session){location.href="index.html";return;}
    currentUser = session.user;
    await loadUserBracket();
    renderStandings(westTeams,'west-table');
    renderStandings(eastTeams,'east-table');
});

async function logout(){
    await supabaseClient.auth.signOut();
    location.href="index.html";
}

async function loadUserBracket(){
    try{
        const {data} = await supabaseClient.from("user_brackets").select("selections").eq("user_id",currentUser.id).maybeSingle();
        if(data?.selections){
            selections = typeof data.selections==='string' ? JSON.parse(data.selections) : data.selections;
        }
    }catch(e){console.error(e);}
    renderBracket();
}

async function saveUserBracket(){
    try{
        await supabaseClient.from("user_brackets").upsert([{
            user_id:currentUser.id,
            selections:selections,
            updated_at:new Date().toISOString()
        }],{onConflict:'user_id'});
    }catch(e){console.error(e);}
}

// 正确对阵规则
function getRound1Matchups(conf){
    const t = conf==='W'?west8:east8;
    return [
        [t[0], t[7]],
        [t[1], t[6]],
        [t[2], t[5]],
        [t[3], t[4]]
    ];
}

function getRound2Matchups(conf){
    const r1 = getRound1Matchups(conf);
    let w = [];
    for(let i=0;i<4;i++){
        let sid = conf+'R1M'+i;
        if(selections[sid]){
            w.push(selections[sid]==='H' ? r1[i][0] : r1[i][1]);
        }else{
            w.push(null);
        }
    }
    // 1/8 对 4/5 ； 2/7 对 3/6
    return [
        w[0]&&w[3] ? [w[0],w[3]] : null,
        w[1]&&w[2] ? [w[1],w[2]] : null
    ];
}

function getRound3Matchups(conf){
    const r2 = getRound2Matchups(conf);
    let w = [];
    for(let i=0;i<2;i++){
        let sid = conf+'R2M'+i;
        if(selections[sid]){
            w.push(selections[sid]==='H' ? r2[i][0] : r2[i][1]);
        }else{
            w.push(null);
        }
    }
    return w[0]&&w[1] ? [[w[0],w[1]]] : [null];
}

function getMatchups(conf,round){
    if(round===1) return getRound1Matchups(conf);
    if(round===2) return getRound2Matchups(conf);
    if(round===3) return getRound3Matchups(conf);
    return [];
}

function mid(conf,round,m){
    return conf+'R'+round+'M'+m;
}

function getFinalsTeams(){
    const w3 = getRound3Matchups('W')[0];
    const e3 = getRound3Matchups('E')[0];
    if(!w3||!e3) return null;
    let wId = 'WR3M0', eId='ER3M0';
    let wTeam = selections[wId] ? (selections[wId]==='H'?w3[0]:w3[1]) : null;
    let eTeam = selections[eId] ? (selections[eId]==='H'?e3[0]:e3[1]) : null;
    if(!wTeam||!eTeam) return null;
    return [wTeam,eTeam];
}

// HTML 模板
function teamHTML(team,matchId,side){
    const isSel = selections[matchId] === side;
    return `
    <div class="team-row ${isSel?'selected':''}" onclick="pick('${matchId}','${side}')">
        <span class="seed-badge">${team.seed}</span>
        <span class="team-dot" style="background:${team.color}"></span>
        <span class="tname">${team.name}</span>
        <span class="trecord">${team.w}-${team.l}</span>
        <span class="win-check">✓</span>
    </div>
    `;
}

function emptyTeamHTML(){
    return `
    <div class="team-row empty">
        <span class="seed-badge">?</span>
        <span class="team-dot" style="background:#333"></span>
        <span class="tname">等待胜者</span>
        <span class="trecord">-</span>
    </div>
    `;
}

function matchupHTML(pair,matchId){
    if(!pair){
        return `<div class="matchup">${emptyTeamHTML()}${emptyTeamHTML()}</div>`;
    }
    return `<div class="matchup">${teamHTML(pair[0],matchId,'H')}${teamHTML(pair[1],matchId,'L')}</div>`;
}

function roundLabel(r){
    return r===1?'首轮':r===2?'半决赛':'分区决赛';
}

// 渲染对阵
function renderBracket(){
    const el = document.getElementById('bracket-main');
    let html = '';

    // 西部
    html += `<div class="conf-side west"><div class="conf-label west">西部</div>`;
    for(let r=1;r<=3;r++){
        html += `<div class="conn"><div class="conn-line"></div></div>`;
        html += `<div class="round-col r${r}"><div class="round-label">${roundLabel(r)}</div>`;
        const ms = getMatchups('W',r);
        const cnt = r===1?4:r===2?2:1;
        for(let i=0;i<cnt;i++){
            html += matchupHTML(ms[i], mid('W',r,i));
        }
        html += `</div>`;
    }
    html += `</div>`;

    // 总决赛
    const ft = getFinalsTeams();
    const fs = selections['FINALS'];
    html += `<div class="finals-zone"><div class="conn"><div class="conn-line"></div></div>
    <div class="finals-card ${fs?'complete':''}">
        <div class="finals-header">NBA 总决赛</div>`;
    if(ft){
        html += `
        <div class="finals-team ${fs==='W'?'selected':''}" onclick="pickFinals('W')">
            <span class="team-dot" style="background:${ft[0].color}"></span>
            <span class="tname">${ft[0].name}</span>
        </div>
        <div class="finals-vs">VS</div>
        <div class="finals-team ${fs==='E'?'selected':''}" onclick="pickFinals('E')">
            <span class="team-dot" style="background:${ft[1].color}"></span>
            <span class="tname">${ft[1].name}</span>
        </div>
        `;
    }else{
        html += `${emptyTeamHTML()}<div class="finals-vs">VS</div>${emptyTeamHTML()}`;
    }
    html += `</div></div>`;

    // 东部
    html += `<div class="conf-side east"><div class="conf-label east">东部</div>`;
    for(let r=1;r<=3;r++){
        html += `<div class="conn"><div class="conn-line"></div></div>`;
        html += `<div class="round-col r${r}"><div class="round-label">${roundLabel(r)}</div>`;
        const ms = getMatchups('E',r);
        const cnt = r===1?4:r===2?2:1;
        for(let i=0;i<cnt;i++){
            html += matchupHTML(ms[i], mid('E',r,i));
        }
        html += `</div>`;
    }
    html += `</div>`;

    el.innerHTML = html;
    updateProgress();
}

// 选择比赛
function pick(matchId,side){
    if(selections[matchId]===side) delete selections[matchId];
    else selections[matchId]=side;
    renderBracket();
    saveUserBracket();
}

// 选择总冠军 + 触发特效
function pickFinals(side){
    const ft = getFinalsTeams();
    if(!ft) return;
    if(selections['FINALS']===side){
        delete selections['FINALS'];
    }else{
        selections['FINALS'] = side;
        let champion = side==='W' ? ft[0] : ft[1];
        showChampionEffect(champion);
    }
    renderBracket();
    saveUserBracket();
}

// 重置
function resetBracket(){
    if(!confirm('确定清空所有预测吗？'))return;
    selections={};
    renderBracket();
    saveUserBracket();
}

// 进度
function updateProgress(){
    const total=15;
    const done = Object.keys(selections).length;
    document.getElementById('progress-num').innerText=done;
    document.getElementById('progress-bar-fill').style.width = (done/total*100)+'%';
}

// 切换标签
function switchTab(event,tab){
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    event.target.classList.add('active');
    document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
    document.getElementById('sec-'+tab).classList.add('active');
}

// 渲染排名
function renderStandings(teams,tableId){
    const tbl = document.getElementById(tableId);
    let html = `
    <thead><tr><th>排名</th><th>球队</th><th>战绩</th><th>胜率</th></tr></thead><tbody>
    `;
    teams.forEach(t=>{
        let rankCls = t.seed<=6?'r1-6':t.seed<=10?'r7-10':'r11-15';
        if(t.seed===7) html += `<tr class="divider-playin"><td colspan="4">附加赛区域 7-10名</td></tr>`;
        if(t.seed===11) html += `<tr class="divider-out"><td colspan="4">无缘季后赛</td></tr>`;
        html += `
        <tr>
            <td><span class="rank-badge ${rankCls}">${t.seed}</span></td>
            <td><div class="team-info"><span class="team-dot-sm" style="background:${t.color}"></span>${t.name}</div></td>
            <td style="color:#aaa">${t.w}-${t.l}</td>
            <td class="pct">${t.pct}</td>
        </tr>
        `;
    });
    html += `</tbody>`;
    tbl.innerHTML = html;
}

// ========== 冠军特效 ==========
let confettiAnim = null;

function showChampionEffect(team){
    document.getElementById('championTeamName').innerText = team.name;
    document.getElementById('championTeamRecord').innerText = `${team.w}胜${team.l}负`;
    document.getElementById('championModal').classList.add('show');
    startConfetti();
}

function closeChampion(){
    document.getElementById('championModal').classList.remove('show');
    stopConfetti();
}

function startConfetti(){
    const canvas = document.getElementById('confetti');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    let pieces = [];
    for(let i=0;i<220;i++){
        pieces.push({
            x:Math.random()*canvas.width,
            y:Math.random()*canvas.height-canvas.height,
            r:Math.random()*8+4,
            d:Math.random()*12+4,
            color:`hsl(${Math.random()*360},100%,60%)`,
            speed:Math.random()*2.5+1.5
        });
    }
    function draw(){
        ctx.clearRect(0,0,canvas.width,canvas.height);
        for(let p of pieces){
            ctx.beginPath();
            ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
            ctx.fillStyle=p.color;
            ctx.fill();
            p.y += p.speed;
            p.x += Math.sin(p.d)*1.5;
            if(p.y>canvas.height) p.y=-20;
        }
        confettiAnim = requestAnimationFrame(draw);
    }
    draw();
}

function stopConfetti(){
    if(confettiAnim) cancelAnimationFrame(confettiAnim);
}
</script>
