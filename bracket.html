<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NBA 2025-26 季后赛预测</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Orbitron:wght@400;700;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: #0a0a0f; color: #fff; min-height: 100vh; overflow-x: hidden;
        }
        .bg-glow { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
        .bg-glow::before {
            content: ''; position: absolute; top: -30%; left: -10%; width: 50%; height: 60%;
            background: radial-gradient(circle, rgba(201,8,42,0.06) 0%, transparent 70%);
        }
        .bg-glow::after {
            content: ''; position: absolute; bottom: -30%; right: -10%; width: 50%; height: 60%;
            background: radial-gradient(circle, rgba(23,64,139,0.06) 0%, transparent 70%);
        }
        .container { position: relative; z-index: 1; max-width: 1800px; margin: 0 auto; padding: 20px; }

        /* 头部 */
        header { text-align: center; padding: 30px 0 20px; position: relative; }
        header::after {
            content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
            width: 300px; height: 2px; background: linear-gradient(90deg, transparent, #c9082a, #17408b, transparent);
        }
        .logo-area { display: flex; align-items: center; justify-content: center; gap: 16px; margin-bottom: 8px; }
        .nba-logo {
            width: 56px; height: 56px; background: linear-gradient(135deg, #c9082a, #8b0620);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 14px;
            box-shadow: 0 0 25px rgba(201,8,42,0.4);
        }
        h1 {
            font-family: 'Orbitron', sans-serif; font-size: 2rem;
            background: linear-gradient(135deg, #fff, #c9082a);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
            letter-spacing: 3px;
        }
        .subtitle { color: #666; font-size: 0.9rem; margin-top: 6px; letter-spacing: 2px; }
        .hint-badge {
            display: inline-block; margin-top: 12px; padding: 6px 20px;
            background: linear-gradient(135deg, rgba(201,8,42,0.15), rgba(23,64,139,0.15));
            border: 1px solid rgba(201,8,42,0.3); border-radius: 20px;
            font-size: 0.8rem; color: #aaa; letter-spacing: 1px;
        }

        /* 选项卡 */
        .tabs { display: flex; justify-content: center; gap: 10px; margin: 24px 0 16px; }
        .tab {
            padding: 10px 24px; border: 1px solid #222; background: transparent; color: #666;
            cursor: pointer; font-family: 'Noto Sans SC', sans-serif; font-size: 0.9rem;
            font-weight: 500; border-radius: 8px; transition: all 0.3s; letter-spacing: 1px;
        }
        .tab:hover { border-color: #c9082a; color: #fff; }
        .tab.active {
            background: linear-gradient(135deg, #c9082a, #8b0620); border-color: #c9082a;
            color: #fff; box-shadow: 0 4px 15px rgba(201,8,42,0.3);
        }
        .section { display: none; }
        .section.active { display: block; }

        /* 进度条 */
        .progress-bar {
            max-width: 500px; margin: 10px auto; padding: 8px 16px;
            background: #141418; border-radius: 10px; border: 1px solid #222;
        }
        .progress-text { font-size: 0.75rem; color: #666; text-align: center; margin-bottom: 6px; }
        .progress-track { width: 100%; height: 4px; background: #222; border-radius: 2px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #c9082a, #ffd700); border-radius: 2px; transition: width 0.5s ease; }

        /* ==================== 对阵图核心 ==================== */
        .bracket-wrapper { overflow-x: auto; padding: 10px 0; }
        .bracket-main {
            display: flex; align-items: center; justify-content: center;
            min-width: 1200px; min-height: 640px; gap: 0;
        }

        /* 每个分区 */
        .conf-side {
            display: flex; align-items: center; flex-shrink: 0;
        }
        .conf-side.west { flex-direction: row; }
        .conf-side.east { flex-direction: row-reverse; }

        .conf-label {
            font-family: 'Orbitron', sans-serif; font-size: 0.7rem; letter-spacing: 3px;
            padding: 6px 16px; border-radius: 20px; text-align: center; white-space: nowrap;
            writing-mode: vertical-rl; text-orientation: mixed;
        }
        .conf-label.west { background: linear-gradient(135deg, #c9082a, #e03050); }
        .conf-label.east { background: linear-gradient(135deg, #17408b, #1a5bc4); }

        /* 轮次列 */
        .round-col {
            display: flex; flex-direction: column; justify-content: center; flex-shrink: 0;
        }
        .round-col.r1 { gap: 12px; }
        .round-col.r2 { gap: 40px; }
        .round-col.r3 { gap: 100px; }

        .round-label {
            text-align: center; font-size: 0.6rem; color: #444; letter-spacing: 2px;
            text-transform: uppercase; margin-bottom: 8px; font-weight: 600;
        }

        /* 连接线 */
        .conn { width: 24px; flex-shrink: 0; display: flex; flex-direction: column; justify-content: center; }
        .conn-line { height: 1px; background: #2a2a2e; }

        /* 对阵卡 */
        .matchup {
            width: 210px; background: linear-gradient(145deg, #131316, #18181c);
            border: 1px solid #252528; border-radius: 10px; overflow: hidden;
            transition: all 0.3s; flex-shrink: 0;
        }
        .matchup:hover { border-color: #c9082a44; box-shadow: 0 0 15px rgba(201,8,42,0.08); }

        .team-row {
            display: flex; align-items: center; padding: 10px 12px; gap: 8px;
            cursor: pointer; transition: all 0.25s; border-left: 3px solid transparent;
        }
        .team-row:first-child { border-bottom: 1px solid #1a1a1e; }
        .team-row:hover { background: rgba(255,255,255,0.04); }
        .team-row.selected {
            background: rgba(201,8,42,0.12); border-left-color: #c9082a;
        }
        .team-row.selected .seed-badge { background: #c9082a; color: #fff; }
        .team-row.eliminated { opacity: 0.25; }
        .team-row.eliminated .tname { text-decoration: line-through; }
        .team-row.empty { cursor: default; opacity: 0.35; }

        .seed-badge {
            width: 22px; height: 22px; border-radius: 4px; font-size: 0.7rem; font-weight: 700;
            display: inline-flex; align-items: center; justify-content: center;
            background: #222; color: #555; flex-shrink: 0; transition: all 0.3s;
        }
        .team-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
        .tname { font-size: 0.8rem; font-weight: 600; flex: 1; }
        .trecord { font-size: 0.65rem; color: #555; white-space: nowrap; }
        .win-check { color: #ffd700; font-size: 0.75rem; margin-left: 4px; opacity: 0; transition: opacity 0.3s; }
        .team-row.selected .win-check { opacity: 1; }

        /* 总决赛 */
        .finals-zone { flex-shrink: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 0 10px; }
        .finals-card {
            width: 230px; background: linear-gradient(145deg, #131316, #18181c);
            border: 2px solid #333; border-radius: 14px; overflow: hidden; transition: all 0.5s;
        }
        .finals-card.complete { border-color: #ffd700; box-shadow: 0 0 40px rgba(255,215,0,0.2); }
        .finals-header {
            padding: 12px; text-align: center;
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            font-family: 'Orbitron', sans-serif; font-size: 0.7rem;
            font-weight: 700; color: #000; letter-spacing: 3px;
        }
        .finals-team {
            padding: 16px 14px; display: flex; align-items: center; gap: 10px;
            cursor: pointer; transition: all 0.3s; border-left: 3px solid transparent;
        }
        .finals-team + .finals-team { border-top: 1px solid #1a1a1e; }
        .finals-team:hover { background: rgba(255,255,255,0.03); }
        .finals-team.selected { background: rgba(255,215,0,0.1); border-left-color: #ffd700; }
        .finals-team.eliminated { opacity: 0.25; }
        .finals-team.empty { cursor: default; }
        .finals-team .team-dot { width: 10px; height: 10px; }
        .finals-team .tname { font-size: 0.9rem; }
        .finals-team .win-check { font-size: 0.9rem; }
        .finals-vs { text-align: center; padding: 4px; font-size: 0.6rem; color: #444; letter-spacing: 2px; font-weight: 700; }

        /* 总冠军特效 */
        .champion-reveal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1000; display: none; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(10px);
        }
        .champion-reveal.show { display: flex; }
        .champion-content { text-align: center; animation: pop 0.8s cubic-bezier(0.175,0.885,0.32,1.275); }
        @keyframes pop { 0% { transform: scale(0.3); opacity: 0; } 50% { transform: scale(1.1); } 100% { transform: scale(1); opacity: 1; } }
        .champion-trophy { font-size: 5rem; animation: bounce 1s ease infinite; }
        @keyframes bounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .champion-label { font-family: 'Orbitron', sans-serif; font-size: 0.9rem; color: #ffd700; letter-spacing: 6px; margin-top: 10px; }
        .champion-name {
            font-size: 2.5rem; font-weight: 900; margin-top: 10px;
            background: linear-gradient(135deg, #ffd700, #fff, #ffd700);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .champion-detail { color: #888; margin-top: 8px; font-size: 0.9rem; }
        .close-btn {
            margin-top: 30px; padding: 10px 30px; background: transparent;
            border: 1px solid #ffd700; color: #ffd700; border-radius: 8px;
            cursor: pointer; font-size: 0.9rem; font-family: 'Noto Sans SC', sans-serif; transition: all 0.3s;
        }
        .close-btn:hover { background: #ffd700; color: #000; }
        .confetti-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1001; overflow: hidden; }
        .confetti { position: absolute; top: -10px; animation: confettiFall linear forwards; }
        @keyframes confettiFall { to { top: 110vh; transform: rotateZ(720deg); } }

        .reset-btn {
            display: block; margin: 20px auto; padding: 10px 30px;
            background: transparent; border: 1px solid #333; color: #666;
            border-radius: 8px; cursor: pointer; font-size: 0.85rem;
            font-family: 'Noto Sans SC', sans-serif; transition: all 0.3s;
        }
        .reset-btn:hover { border-color: #c9082a; color: #fff; }

        /* ==================== 排名 ==================== */
        .standings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-top: 16px; }
        .conf-table {
            background: linear-gradient(145deg, #111114, #16161a);
            border-radius: 14px; overflow: hidden; border: 1px solid #1e1e22;
        }
        .conf-table-header {
            padding: 16px; text-align: center; font-family: 'Orbitron', sans-serif;
            font-size: 0.95rem; font-weight: 700; letter-spacing: 3px;
        }
        .conf-table-header.west { background: linear-gradient(135deg, #c9082a, #e03050); }
        .conf-table-header.east { background: linear-gradient(135deg, #17408b, #1a5bc4); }
        .s-table { width: 100%; border-collapse: collapse; }
        .s-table th { padding: 10px 14px; text-align: left; color: #555; font-size: 0.7rem; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; border-bottom: 1px solid #1e1e22; }
        .s-table td { padding: 9px 14px; font-size: 0.85rem; border-bottom: 1px solid #141418; }
        .s-table tr:hover td { background: rgba(255,255,255,0.02); }
        .rank-badge { display: inline-flex; align-items: center; justify-content: center; width: 24px; height: 24px; border-radius: 5px; font-weight: 700; font-size: 0.75rem; }
        .rank-badge.r1-6 { background: linear-gradient(135deg, #c9082a, #8b0620); color: #fff; }
        .rank-badge.r7-10 { background: linear-gradient(135deg, #2d5a1e, #3d7a2e); color: #fff; }
        .rank-badge.r11-15 { background: #1a1a1e; color: #444; }
        .team-info { display: flex; align-items: center; gap: 8px; font-weight: 600; }
        .team-dot-sm { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
        .divider-playin td { padding: 6px 14px; background: rgba(45,90,30,0.1); color: #4ade80; font-size: 0.7rem; font-weight: 600; letter-spacing: 2px; text-align: center; }
        .divider-out td { padding: 6px 14px; background: rgba(100,100,100,0.05); color: #444; font-size: 0.7rem; font-weight: 600; letter-spacing: 2px; text-align: center; }
        .pct { color: #c9082a; font-weight: 600; }

        @media (max-width: 900px) { .standings-grid { grid-template-columns: 1fr; } h1 { font-size: 1.4rem; } }
        ::-webkit-scrollbar { height: 5px; width: 5px; }
        ::-webkit-scrollbar-track { background: #0a0a0f; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
    </style>
</head>

<script>

const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1xZ212cHd3ZXF2aXd5Y2NqbWRqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyODk2NjEsImV4cCI6MjA5Mzg2NTY2MX0.pV6r_eG865nEJv83-p-0bWkW3H5_jgowAsjgH1s7rAU";

const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
let currentUser = null;
let selections = {};

// 登录校验
supabase.auth.onAuthStateChange(async (e, sess) => {
    if(!sess){
        location.href = "index.html";
        return;
    }
    currentUser = sess.user;
    await loadUserBracket();
});

// 退出登录
async function logout(){
    await supabase.auth.signOut();
}

// 加载用户数据
async function loadUserBracket(){
    const { data } = await supabase
        .from("user_brackets")
        .select("selections")
        .eq("user_id", currentUser.id)
        .single();

    if(data?.selections){
        selections = data.selections;
    }else{
        selections = {};
    }
    renderBracket();
}

// 保存用户数据
async function saveUserBracket(){
    if(!currentUser) return;
    await supabase.from("user_brackets").upsert({
        user_id: currentUser.id,
        selections: selections
    }, { onConflict: "user_id" });
}

// ==================== 数据 ====================

    { seed:13, name:'布鲁克林篮网', abbr:'BKN', color:'#000000', w:20, l:62, pct:'.244' },
    { seed:14, name:'印第安纳步行者', abbr:'IND', color:'#002D62', w:19, l:63, pct:'.232' },

];

const west8 = westTeams.slice(0, 8);
const east8 = eastTeams.slice(0, 8);

// ==================== 对阵逻辑 ====================
function mid(conf, round, m) { return conf + 'R' + round + 'M' + m; }

function getMatchups(conf, round) {
    const t = conf === 'W' ? west8 : east8;
    if (round === 1) {
        return [[t[0],t[7]], [t[1],t[6]], [t[2],t[5]], [t[3],t[4]]];
    }
    const prev = getMatchups(conf, round - 1);
    if (!prev) return null;
    const winners = [];
    for (let i = 0; i < prev.length; i++) {
        const s = selections[mid(conf, round-1, i)];
        if (!s) return null;
        winners.push(s === 'H' ? prev[i][0] : prev[i][1]);
    }
    const result = [];
    for (let i = 0; i < winners.length; i += 2) {
        if (i + 1 < winners.length) result.push([winners[i], winners[i+1]]);
    }
    return result;
}

function getFinalsTeams() {
    const w = getMatchups('W', 3), e = getMatchups('E', 3);
    if (!w || !e) return null;
    const ws = selections[mid('W',3,0)], es = selections[mid('E',3,0)];
    if (!ws || !es) return null;
    return [ws === 'H' ? w[0][0] : w[0][1], es === 'H' ? e[0][0] : e[0][1]];
}

// ==================== 渲染 ====================
function teamHTML(team, matchId, side, sel) {
    const isSel = sel === side;
    const isElim = sel && !isSel;
    const cls = isSel ? 'selected' : (isElim ? 'eliminated' : '');
    return '<div class="team-row ' + cls + '" onclick="pick(\'' + matchId + '\',\'' + side + '\')">' +
        '<span class="seed-badge">' + team.seed + '</span>' +
        '<span class="team-dot" style="background:' + team.color + '"></span>' +
        '<span class="tname">' + team.name + '</span>' +
        '<span class="trecord">' + team.w + '-' + team.l + '</span>' +
        '<span class="win-check">✓</span></div>';
}

function emptyHTML() {
    return '<div class="team-row empty">' +
        '<span class="seed-badge">?</span>' +
        '<span class="team-dot" style="background:#333"></span>' +
        '<span class="tname" style="color:#555">待定</span>' +
        '<span class="trecord">-</span>' +
        '<span class="win-check"></span></div>';
}

function matchupHTML(pair, matchId, sel) {
    return '<div class="matchup">' +
        teamHTML(pair[0], matchId, 'H', sel) +
        teamHTML(pair[1], matchId, 'L', sel) +
        '</div>';
}

function emptyMatchupHTML() {
    return '<div class="matchup">' + emptyHTML() + emptyHTML() + '</div>';
}

function roundLabel(r) {
    return r === 1 ? '首轮' : r === 2 ? '半决赛' : '分区决赛';
}

function renderBracket() {
    const el = document.getElementById('bracket-main');
    let h = '';

    // ---- 西部 ----
    h += '<div class="conf-side west">';
    h += '<div class="conf-label west">WEST</div>';
    for (let r = 1; r <= 3; r++) {
        h += '<div class="conn"><div class="conn-line"></div></div>';
        const mc = r === 1 ? 4 : r === 2 ? 2 : 1;
        h += '<div class="round-col r' + r + '">';
        h += '<div class="round-label">' + roundLabel(r) + '</div>';
        const matchups = getMatchups('W', r);
        for (let m = 0; m < mc; m++) {
            const mId = mid('W', r, m);
            const sel = selections[mId];
            if (matchups && matchups[m]) {
                h += matchupHTML(matchups[m], mId, sel);
            } else {
                h += emptyMatchupHTML();
            }
        }
        h += '</div>';
    }
    h += '</div>';

    // ---- 总决赛 ----
    const ft = getFinalsTeams();
    const fs = selections['FINALS'];
    h += '<div class="finals-zone">';
    h += '<div class="conn"><div class="conn-line"></div></div>';
    h += '<div class="finals-card ' + (fs ? 'complete' : '') + '">';
    h += '<div class="finals-header">🏆 NBA FINALS</div>';
    if (ft) {
        const wSel = fs === 'H', eSel = fs === 'L';
        h += '<div class="finals-team ' + (wSel ? 'selected' : (fs ? 'eliminated' : '')) + '" onclick="pickFinals(\'H\')">';
        h += '<span class="team-dot" style="background:' + ft[0].color + '"></span>';
        h += '<span class="tname">' + ft[0].name + '</span>';
        h += '<span class="win-check">👑</span></div>';
        h += '<div class="finals-vs">VS</div>';
        h += '<div class="finals-team ' + (eSel ? 'selected' : (fs ? 'eliminated' : '')) + '" onclick="pickFinals(\'L\')">';
        h += '<span class="team-dot" style="background:' + ft[1].color + '"></span>';
        h += '<span class="tname">' + ft[1].name + '</span>';
        h += '<span class="win-check">👑</span></div>';
    } else {
        h += '<div class="finals-team empty"><span class="tname" style="color:#555">等待西部冠军</span></div>';
        h += '<div class="finals-vs">VS</div>';
        h += '<div class="finals-team empty"><span class="tname" style="color:#555">等待东部冠军</span></div>';
    }
    h += '</div></div>';

    // ---- 东部 ----
    h += '<div class="conf-side east">';
    for (let r = 1; r <= 3; r++) {
        const mc = r === 1 ? 4 : r === 2 ? 2 : 1;
        h += '<div class="round-col r' + r + '">';
        h += '<div class="round-label">' + roundLabel(r) + '</div>';
        const matchups = getMatchups('E', r);
        for (let m = 0; m < mc; m++) {
            const mId = mid('E', r, m);
            const sel = selections[mId];
            if (matchups && matchups[m]) {
                h += matchupHTML(matchups[m], mId, sel);
            } else {
                h += emptyMatchupHTML();
            }
        }
        h += '</div>';
        h += '<div class="conn"><div class="conn-line"></div></div>';
    }
    h += '<div class="conf-label east">EAST</div>';
    h += '</div>';

    el.innerHTML = h;
    updateProgress();
}

// ==================== 交互 ====================
function pick(matchId, side) {
    if (selections[matchId] === side) {
        delete selections[matchId];
    } else {
        selections[matchId] = side;
    }
    const parts = matchId.match(/^(W|R|E)R(\d)M(\d)$/);
    if (parts) {
        const conf = parts[1];
        const round = parseInt(parts[2]);
        for (let r = round + 1; r <= 3; r++) {
            const mc = r === 2 ? 2 : 1;
            for (let m = 0; m < mc; m++) delete selections[mid(conf, r, m)];
        }
        delete selections['FINALS'];
    }
    renderBracket();
    saveUserBracket(); // 自动保存
}

function pickFinals(side) {
    if (selections['FINALS'] === side) {
        delete selections['FINALS'];
        renderBracket();
    } else {
        selections['FINALS'] = side;
        renderBracket();
        saveUserBracket(); // 自动保存
        setTimeout(showChampion, 300);
    }
}

function resetBracket() {
    selections = {};
    renderBracket();
    saveUserBracket(); // 自动保存
    document.getElementById('champion-reveal').classList.remove('show');
}

function updateProgress() {
    const total = 15;
    const done = Object.keys(selections).length;
    document.getElementById('progress-text').textContent = '预测进度: ' + done + ' / ' + total;
    document.getElementById('progress-fill').style.width = Math.round(done/total*100) + '%';
}

// ==================== 总冠军特效 ====================
function showChampion() {
    const ft = getFinalsTeams();
    if (!ft) return;
    const fs = selections['FINALS'];
    if (!fs) return;
    const champ = fs === 'H' ? ft[0] : ft[1];
    document.getElementById('champion-name').textContent = champ.name;
    document.getElementById('champion-detail').textContent = champ.abbr + ' · ' + champ.w + '胜' + champ.l + '负';
    document.getElementById('champion-reveal').classList.add('show');
    launchConfetti();
}

function closeChampion() {
    document.getElementById('champion-reveal').classList.remove('show');
}

function launchConfetti() {
    const c = document.getElementById('confetti-container');
    c.innerHTML = '';
    const colors = ['#ffd700','#c9082a','#17408b','#ff4d6a','#4ade80','#fff','#ff8c00'];
    for (let i = 0; i < 120; i++) {
        const el = document.createElement('div');
        el.className = 'confetti';
        el.style.left = Math.random()*100 + '%';
        el.style.background = colors[Math.floor(Math.random()*colors.length)];
        el.style.width = (Math.random()*10+5) + 'px';
        el.style.height = (Math.random()*10+5) + 'px';
        el.style.borderRadius = Math.random()>0.5 ? '50%' : '2px';
        el.style.animationDuration = (Math.random()*2+2) + 's';
        el.style.animationDelay = (Math.random()*1.5) + 's';
        el.style.opacity = Math.random()*0.8+0.2;
        c.appendChild(el);
    }
}

// ==================== 排名 ====================
function renderStandings(teams, tableId) {
    const table = document.getElementById(tableId);
    let h = '<thead><tr><th>排名</th><th>球队</th><th>战绩</th><th>胜率</th></tr></thead><tbody>';
    teams.forEach(function(t, i) {
        if (i === 6) h += '<tr class="divider-playin"><td colspan="4">▸ 附加赛区域 ◂</td></tr>';
        if (i === 8) h += '<tr class="divider-out"><td colspan="4">▸ 未进入季后赛 ◂</td></tr>';
        const rc = t.seed <= 6 ? 'r1-6' : (t.seed <= 10 ? 'r7-10' : 'r11-15');
        h += '<tr><td><span class="rank-badge ' + rc + '">' + t.seed + '</span></td>';
        h += '<td><div class="team-info"><span class="team-dot-sm" style="background:' + t.color + '"></span>' + t.name + '</div></td>';
        h += '<td style="color:#aaa">' + t.w + '-' + t.l + '</td>';
        h += '<td class="pct">' + t.pct + '</td></tr>';
    });
    h += '</tbody>';
    table.innerHTML = h;
}

// ==================== 选项卡 ====================
function switchTab(tab) {
    document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
    document.querySelectorAll('.section').forEach(function(s) { s.classList.remove('active'); });
    if (tab === 'bracket') {
        document.querySelectorAll('.tab')[0].classList.add('active');
        document.getElementById('sec-bracket').classList.add('active');
    } else {
        document.querySelectorAll('.tab')[1].classList.add('active');
        document.getElementById('sec-standings').classList.add('active');
    }
}

// 初始化
renderStandings(westTeams, 'west-table');
renderStandings(eastTeams, 'east-table');
</script>
