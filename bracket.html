<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>NBA 2025-26 季后赛预测</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Orbitron:wght@400;700;900&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Noto Sans SC',sans-serif;
    background:#0a0a0f;
    color:#fff;
    min-height:100vh;
    overflow-x:hidden;
}

.bg-glow{
    position:fixed;
    inset:0;
    z-index:0;
    pointer-events:none;
}

.bg-glow::before{
    content:'';
    position:absolute;
    top:-30%;
    left:-10%;
    width:50%;
    height:60%;
    background:radial-gradient(circle,rgba(201,8,42,0.08) 0%,transparent 70%);
}

.bg-glow::after{
    content:'';
    position:absolute;
    bottom:-30%;
    right:-10%;
    width:50%;
    height:60%;
    background:radial-gradient(circle,rgba(23,64,139,0.08) 0%,transparent 70%);
}

.container{
    position:relative;
    z-index:1;
    max-width:1800px;
    margin:0 auto;
    padding:20px;
}

header{
    text-align:center;
    padding:30px 0 20px;
    position:relative;
}

header::after{
    content:'';
    position:absolute;
    bottom:0;
    left:50%;
    transform:translateX(-50%);
    width:300px;
    height:2px;
    background:linear-gradient(
        90deg,
        transparent,
        #c9082a,
        #17408b,
        transparent
    );
}

.logo-area{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:16px;
    margin-bottom:8px;
}

.nba-logo{
    width:56px;
    height:56px;
    border-radius:50%;
    background:linear-gradient(135deg,#c9082a,#8b0620);
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'Orbitron',sans-serif;
    font-weight:900;
    font-size:14px;
    box-shadow:0 0 25px rgba(201,8,42,.4);
}

h1{
    font-family:'Orbitron',sans-serif;
    font-size:2rem;
    letter-spacing:3px;

    background:linear-gradient(
        135deg,
        #fff,
        #c9082a
    );

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.subtitle{
    color:#777;
    margin-top:6px;
}

.hint-badge{
    display:inline-block;
    margin-top:12px;
    padding:6px 20px;
    border-radius:20px;

    background:linear-gradient(
        135deg,
        rgba(201,8,42,.15),
        rgba(23,64,139,.15)
    );

    border:1px solid rgba(201,8,42,.25);

    font-size:.8rem;
    color:#aaa;
}

.tabs{
    display:flex;
    justify-content:center;
    gap:10px;
    margin:24px 0 16px;
}

.tab{
    padding:10px 24px;
    border-radius:8px;
    border:1px solid #222;
    background:transparent;
    color:#777;
    cursor:pointer;
    transition:.25s;
}

.tab:hover{
    border-color:#c9082a;
    color:#fff;
}

.tab.active{
    background:linear-gradient(135deg,#c9082a,#8b0620);
    border-color:#c9082a;
    color:#fff;
}

.section{
    display:none;
}

.section.active{
    display:block;
}

.progress-bar{
    max-width:500px;
    margin:10px auto;
    padding:8px 16px;
    background:#141418;
    border-radius:10px;
    border:1px solid #222;
}

.progress-text{
    font-size:.75rem;
    color:#777;
    text-align:center;
    margin-bottom:6px;
}

.progress-track{
    width:100%;
    height:4px;
    background:#222;
    border-radius:2px;
    overflow:hidden;
}

.progress-fill{
    height:100%;
    width:0%;
    transition:.35s;
    background:linear-gradient(
        90deg,
        #c9082a,
        #ffd700
    );
}

.bracket-wrapper{
    overflow-x:auto;
    padding:10px 0;
}

.bracket-main{
    display:flex;
    align-items:center;
    justify-content:center;
    min-width:1400px;
    min-height:680px;
}

.conf-side{
    display:flex;
    align-items:center;
}

.conf-side.east{
    flex-direction:row-reverse;
}

.conf-label{
    writing-mode:vertical-rl;
    text-orientation:mixed;

    padding:8px 14px;
    border-radius:20px;

    font-size:.7rem;
    letter-spacing:3px;
    font-family:'Orbitron',sans-serif;
}

.conf-label.west{
    background:linear-gradient(135deg,#c9082a,#e03050);
}

.conf-label.east{
    background:linear-gradient(135deg,#17408b,#1a5bc4);
}

.round-col{
    display:flex;
    flex-direction:column;
    justify-content:center;
}

.round-col.r1{
    gap:14px;
}

.round-col.r2{
    gap:54px;
}

.round-col.r3{
    gap:120px;
}

.round-label{
    text-align:center;
    font-size:.65rem;
    letter-spacing:2px;
    color:#555;
    margin-bottom:10px;
}

.conn{
    width:26px;
    display:flex;
    align-items:center;
    justify-content:center;
}

.conn-line{
    width:100%;
    height:1px;
    background:#2a2a2e;
}

.matchup{
    width:220px;

    background:linear-gradient(
        145deg,
        #131316,
        #18181c
    );

    border:1px solid #252528;
    border-radius:12px;
    overflow:hidden;

    transition:.25s;
}

.matchup:hover{
    border-color:rgba(201,8,42,.35);
    box-shadow:0 0 15px rgba(201,8,42,.08);
}

.team-row{
    display:flex;
    align-items:center;
    gap:8px;

    padding:10px 12px;

    cursor:pointer;
    transition:.25s;

    border-left:3px solid transparent;
}

.team-row:first-child{
    border-bottom:1px solid #1d1d20;
}

.team-row:hover{
    background:rgba(255,255,255,.03);
}

.team-row.selected{
    background:rgba(201,8,42,.12);
    border-left-color:#c9082a;
}

.team-row.empty{
    cursor:default;
    opacity:.35;
}

.seed-badge{
    width:22px;
    height:22px;
    border-radius:4px;

    display:flex;
    align-items:center;
    justify-content:center;

    background:#222;
    color:#666;

    font-size:.72rem;
    font-weight:700;
}

.team-row.selected .seed-badge{
    background:#c9082a;
    color:#fff;
}

.team-dot{
    width:8px;
    height:8px;
    border-radius:50%;
}

.tname{
    flex:1;
    font-size:.82rem;
    font-weight:600;
}

.trecord{
    font-size:.65rem;
    color:#666;
}

.win-check{
    opacity:0;
    color:#ffd700;
    transition:.25s;
}

.team-row.selected .win-check{
    opacity:1;
}

.finals-zone{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:0 12px;
}

.finals-card{
    width:240px;

    background:linear-gradient(
        145deg,
        #131316,
        #18181c
    );

    border:2px solid #333;
    border-radius:14px;
    overflow:hidden;
}

.finals-card.complete{
    border-color:#ffd700;
    box-shadow:0 0 30px rgba(255,215,0,.2);
}

.finals-header{
    padding:12px;
    text-align:center;

    background:linear-gradient(
        135deg,
        #ffd700,
        #ff8c00
    );

    color:#000;

    font-family:'Orbitron',sans-serif;
    font-size:.7rem;
    font-weight:700;
    letter-spacing:3px;
}

.finals-team{
    display:flex;
    align-items:center;
    gap:10px;

    padding:16px 14px;

    cursor:pointer;
    transition:.25s;

    border-left:3px solid transparent;
}

.finals-team + .finals-team{
    border-top:1px solid #1d1d20;
}

.finals-team:hover{
    background:rgba(255,255,255,.03);
}

.finals-team.selected{
    background:rgba(255,215,0,.1);
    border-left-color:#ffd700;
}

.finals-vs{
    text-align:center;
    font-size:.65rem;
    color:#555;
    padding:4px;
    letter-spacing:2px;
}

.reset-btn{
    display:block;
    margin:20px auto;

    padding:10px 30px;

    border-radius:8px;
    border:1px solid #333;

    background:transparent;
    color:#888;

    cursor:pointer;
    transition:.25s;
}

.reset-btn:hover{
    border-color:#c9082a;
    color:#fff;
}

.standings-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:24px;
    margin-top:18px;
}

.conf-table{
    background:linear-gradient(145deg,#111114,#16161a);
    border-radius:14px;
    overflow:hidden;
    border:1px solid #1e1e22;
}

.conf-table-header{
    padding:16px;
    text-align:center;

    font-family:'Orbitron',sans-serif;
    letter-spacing:3px;
    font-weight:700;
}

.conf-table-header.west{
    background:linear-gradient(135deg,#c9082a,#e03050);
}

.conf-table-header.east{
    background:linear-gradient(135deg,#17408b,#1a5bc4);
}

.s-table{
    width:100%;
    border-collapse:collapse;
}

.s-table th{
    padding:10px 14px;
    text-align:left;
    color:#666;
    border-bottom:1px solid #1e1e22;
    font-size:.72rem;
}

.s-table td{
    padding:10px 14px;
    border-bottom:1px solid #151518;
    font-size:.85rem;
}

.rank-badge{
    width:24px;
    height:24px;
    border-radius:5px;

    display:inline-flex;
    align-items:center;
    justify-content:center;

    font-weight:700;
    font-size:.75rem;
}

.rank-badge.r1-6{
    background:#c9082a;
}

.rank-badge.r7-10{
    background:#2d5a1e;
}

.rank-badge.r11-15{
    background:#1d1d20;
    color:#666;
}

.team-info{
    display:flex;
    align-items:center;
    gap:8px;
    font-weight:600;
}

.team-dot-sm{
    width:6px;
    height:6px;
    border-radius:50%;
}

.divider-playin td{
    background:rgba(45,90,30,.08);
    color:#4ade80;
    text-align:center;
    font-size:.72rem;
}

.divider-out td{
    background:rgba(100,100,100,.05);
    color:#555;
    text-align:center;
    font-size:.72rem;
}

.pct{
    color:#c9082a;
    font-weight:600;
}

@media(max-width:900px){

    .standings-grid{
        grid-template-columns:1fr;
    }

    h1{
        font-size:1.4rem;
    }

}
</style>
</head>

<body>

<div class="bg-glow"></div>

<div class="container">

<header>

<div class="logo-area">
    <div class="nba-logo">NBA</div>
    <h1>PLAYOFFS 2026</h1>
</div>

<p class="subtitle">
    2025-26 赛季 · 季后赛预测
</p>

<div class="hint-badge">
    👆 点击球队选择晋级 · 自动云端保存
</div>

<button class="reset-btn" onclick="logout()">
    🚪 退出登录
</button>

</header>

<div class="tabs">
    <button class="tab active" onclick="switchTab(event,'bracket')">
        季后赛对阵图
    </button>

    <button class="tab" onclick="switchTab(event,'standings')">
        常规赛排名
    </button>
</div>

<div class="section active" id="sec-bracket">

<div class="progress-bar">

    <div class="progress-text">
        预测进度:
        <span id="progress-num">0</span>
        / 15
    </div>

    <div class="progress-track">
        <div class="progress-fill" id="progress-bar-fill"></div>
    </div>

</div>

<div class="bracket-wrapper">
    <div class="bracket-main" id="bracket-main"></div>
</div>

<button class="reset-btn" onclick="resetBracket()">
    🔄 重置所有预测
</button>

</div>

<div class="section" id="sec-standings">

<div class="standings-grid">

<div class="conf-table">
    <div class="conf-table-header west">
        西部联盟 WEST
    </div>

    <table class="s-table" id="west-table"></table>
</div>

<div class="conf-table">
    <div class="conf-table-header east">
        东部联盟 EAST
    </div>

    <table class="s-table" id="east-table"></table>
</div>

</div>
</div>

</div>

<script>

// ==================== SUPABASE ====================

const SUPABASE_URL =
"https://mqgmvpwweqviwyccjmdj.supabase.co";

const SUPABASE_KEY =
"YOUR_SUPABASE_ANON_KEY";

const supabaseClient =
window.supabase.createClient(
    SUPABASE_URL,
    SUPABASE_KEY
);

let currentUser = null;

let selections = {};

// ==================== 球队数据 ====================

const westTeams = [

{ seed:1, name:'俄克拉荷马城雷霆', color:'#007AC1', w:64, l:18, pct:'.780' },
{ seed:2, name:'圣安东尼奥马刺', color:'#C4CED4', w:62, l:20, pct:'.756' },
{ seed:3, name:'丹佛掘金', color:'#0E2240', w:54, l:28, pct:'.659' },
{ seed:4, name:'洛杉矶湖人', color:'#552583', w:53, l:29, pct:'.646' },
{ seed:5, name:'休斯顿火箭', color:'#CE1141', w:52, l:30, pct:'.634' },
{ seed:6, name:'明尼苏达森林狼', color:'#0C2340', w:49, l:33, pct:'.598' },
{ seed:7, name:'波特兰开拓者', color:'#E03A3E', w:42, l:40, pct:'.512' },
{ seed:8, name:'菲尼克斯太阳', color:'#1D1160', w:45, l:37, pct:'.549' },
{ seed:9, name:'洛杉矶快船', color:'#C8102E', w:42, l:40, pct:'.512' },
{ seed:10, name:'金州勇士', color:'#1D428A', w:37, l:45, pct:'.451' },
{ seed:11, name:'新奥尔良鹈鹕', color:'#0C2340', w:26, l:56, pct:'.317' },
{ seed:12, name:'达拉斯独行侠', color:'#00538C', w:26, l:56, pct:'.317' },
{ seed:13, name:'孟菲斯灰熊', color:'#5D76A9', w:25, l:57, pct:'.305' },
{ seed:14, name:'萨克拉门托国王', color:'#5A2D81', w:22, l:60, pct:'.268' },
{ seed:15, name:'犹他爵士', color:'#002B5C', w:22, l:60, pct:'.268' }

];

const eastTeams = [

{ seed:1, name:'底特律活塞', color:'#C8102E', w:60, l:22, pct:'.732' },
{ seed:2, name:'波士顿凯尔特人', color:'#007A33', w:56, l:26, pct:'.683' },
{ seed:3, name:'纽约尼克斯', color:'#006BB6', w:53, l:29, pct:'.646' },
{ seed:4, name:'克利夫兰骑士', color:'#860038', w:52, l:30, pct:'.634' },
{ seed:5, name:'多伦多猛龙', color:'#CE1141', w:46, l:36, pct:'.561' },
{ seed:6, name:'亚特兰大老鹰', color:'#E03A3E', w:46, l:36, pct:'.561' },
{ seed:7, name:'费城76人', color:'#006BB6', w:45, l:37, pct:'.549' },
{ seed:8, name:'奥兰多魔术', color:'#0077C0', w:45, l:37, pct:'.549' },
{ seed:9, name:'夏洛特黄蜂', color:'#1D1160', w:44, l:38, pct:'.537' },
{ seed:10, name:'迈阿密热火', color:'#98002E', w:43, l:39, pct:'.524' },
{ seed:11, name:'密尔沃基雄鹿', color:'#00471B', w:32, l:50, pct:'.390' },
{ seed:12, name:'芝加哥公牛', color:'#CE1141', w:31, l:51, pct:'.378' },
{ seed:13, name:'布鲁克林篮网', color:'#000000', w:20, l:62, pct:'.244' },
{ seed:14, name:'印第安纳步行者', color:'#002D62', w:19, l:63, pct:'.232' },
{ seed:15, name:'华盛顿奇才', color:'#002B5C', w:17, l:65, pct:'.207' }

];

const west8 = westTeams.slice(0,8);
const east8 = eastTeams.slice(0,8);

// ==================== 页面初始化 ====================

document.addEventListener(
    'DOMContentLoaded',
    async ()=>{

    const {
        data:{session}
    } =
    await supabaseClient.auth.getSession();

    if(!session){

        location.href = "index.html";
        return;

    }

    currentUser = session.user;

    await loadUserBracket();

    renderStandings(
        westTeams,
        'west-table'
    );

    renderStandings(
        eastTeams,
        'east-table'
    );

});

// ==================== 退出 ====================

async function logout(){

    await supabaseClient.auth.signOut();

    location.href = "index.html";

}

// ==================== 数据 ====================

async function loadUserBracket(){

    try{

        const {data} =
        await supabaseClient
            .from("user_brackets")
            .select("selections")
            .eq("user_id", currentUser.id)
            .maybeSingle();

        if(data?.selections){

            if(
                typeof data.selections
                === 'string'
            ){

                selections =
                JSON.parse(
                    data.selections
                );

            }else{

                selections =
                data.selections;

            }

        }

    }catch(err){

        console.error(err);

    }

    renderBracket();

}

async function saveUserBracket(){

    try{

        await supabaseClient
            .from("user_brackets")
            .upsert([{

                user_id:
                    currentUser.id,

                selections:
                    selections,

                updated_at:
                    new Date().toISOString()

            }],{

                onConflict:'user_id'

            });

    }catch(err){

        console.error(err);

    }

}

// ==================== 工具 ====================

function mid(conf,round,m){

    return conf + 'R' + round + 'M' + m;

}

function getMatchups(conf,round){

    const t =
    conf === 'W'
    ? west8
    : east8;

    if(round === 1){

        return [

            [t[0],t[7]],
            [t[1],t[6]],
            [t[2],t[5]],
            [t[3],t[4]]

        ];

    }

    const prev =
    getMatchups(
        conf,
        round - 1
    );

    const winners = [];

    for(
        let i=0;
        i<prev.length;
        i++
    ){

        const s =
        selections[
            mid(conf,round-1,i)
        ];

        if(s){

            winners.push(

                s === 'H'
                ? prev[i][0]
                : prev[i][1]

            );

        }else{

            winners.push(null);

        }

    }

    const res = [];

    for(
        let i=0;
        i<winners.length;
        i+=2
    ){

        if(
            winners[i]
            &&
            winners[i+1]
        ){

            res.push([

                winners[i],
                winners[i+1]

            ]);

        }else{

            res.push(null);

        }

    }

    return res;

}

function getFinalsTeams(){

    const w =
    getMatchups('W',3);

    const e =
    getMatchups('E',3);

    if(
        !w[0]
        ||
        !e[0]
    ){
        return null;
    }

    const ws =
    selections[mid('W',3,0)];

    const es =
    selections[mid('E',3,0)];

    if(!ws || !es){

        return null;

    }

    return [

        ws === 'H'
        ? w[0][0]
        : w[0][1],

        es === 'H'
        ? e[0][0]
        : e[0][1]

    ];

}

// ==================== HTML ====================

function teamHTML(
    team,
    matchId,
    side
){

    const isSel =
    selections[matchId]
    === side;

    return `
    <div
        class="team-row ${isSel ? 'selected':''}"
        onclick="pick('${matchId}','${side}')"
    >

        <span class="seed-badge">
            ${team.seed}
        </span>

        <span
            class="team-dot"
            style="background:${team.color}"
        ></span>

        <span class="tname">
            ${team.name}
        </span>

        <span class="trecord">
            ${team.w}-${team.l}
        </span>

        <span class="win-check">
            ✓
        </span>

    </div>
    `;

}

function emptyTeamHTML(){

    return `
    <div class="team-row empty">

        <span class="seed-badge">?</span>

        <span
            class="team-dot"
            style="background:#333"
        ></span>

        <span class="tname">
            等待胜者
        </span>

        <span class="trecord">-</span>

    </div>
    `;

}

function matchupHTML(pair,matchId){

    if(!pair){

        return `
        <div class="matchup">
            ${emptyTeamHTML()}
            ${emptyTeamHTML()}
        </div>
        `;
    }

    return `
    <div class="matchup">

        ${teamHTML(pair[0],matchId,'H')}

        ${teamHTML(pair[1],matchId,'L')}

    </div>
    `;

}

function roundLabel(r){

    return r===1
        ? '首轮'
        : r===2
        ? '半决赛'
        : '分区决赛';

}

// ==================== 渲染对阵 ====================

function renderBracket(){

    const el =
    document.getElementById(
        'bracket-main'
    );

    let html = '';

    // 西部
    html += `
    <div class="conf-side west">

        <div class="conf-label west">
            西部
        </div>
    `;

    for(let r=1;r<=3;r++){

        html += `
        <div class="conn">
            <div class="conn-line"></div>
        </div>
        `;

        html += `
        <div class="round-col r${r}">
            <div class="round-label">
                ${roundLabel(r)}
            </div>
        `;

        const ms =
        getMatchups('W',r);

        const cnt =
        r===1 ? 4 :
        r===2 ? 2 : 1;

        for(let i=0;i<cnt;i++){

            html += matchupHTML(
                ms[i],
                mid('W',r,i)
            );

        }

        html += `</div>`;

    }

    html += `</div>`;

    // 总决赛

    const ft =
    getFinalsTeams();

    const fs =
    selections['FINALS'];

    html += `
    <div class="finals-zone">

        <div class="conn">
            <div class="conn-line"></div>
        </div>

        <div class="finals-card ${fs ? 'complete':''}">

            <div class="finals-header">
                NBA 总决赛
            </div>
    `;

    if(ft){

        html += `
        <div
            class="finals-team ${fs==='W' ? 'selected':''}"
            onclick="pickFinals('W')"
        >

            <span
                class="team-dot"
                style="background:${ft[0].color}"
            ></span>

            <span class="tname">
                ${ft[0].name}
            </span>

        </div>

        <div class="finals-vs">
            VS
        </div>

        <div
            class="finals-team ${fs==='E' ? 'selected':''}"
            onclick="pickFinals('E')"
        >

            <span
                class="team-dot"
                style="background:${ft[1].color}"
            ></span>

            <span class="tname">
                ${ft[1].name}
            </span>

        </div>
        `;

    }else{

        html += `
        ${emptyTeamHTML()}
        <div class="finals-vs">VS</div>
        ${emptyTeamHTML()}
        `;
    }

    html += `
        </div>
    </div>
    `;

    // 东部

    html += `
    <div class="conf-side east">

        <div class="conf-label east">
            东部
        </div>
    `;

    for(let r=1;r<=3;r++){

        html += `
        <div class="conn">
            <div class="conn-line"></div>
        </div>
        `;

        html += `
        <div class="round-col r${r}">
            <div class="round-label">
                ${roundLabel(r)}
            </div>
        `;

        const ms =
        getMatchups('E',r);

        const cnt =
        r===1 ? 4 :
        r===2 ? 2 : 1;

        for(let i=0;i<cnt;i++){

            html += matchupHTML(
                ms[i],
                mid('E',r,i)
            );

        }

        html += `</div>`;

    }

    html += `</div>`;

    el.innerHTML = html;

    updateProgress();

}

// ==================== 选择 ====================

function pick(matchId,side){

    if(
        selections[matchId]
        === side
    ){

        delete selections[matchId];

    }else{

        selections[matchId] = side;

    }

    renderBracket();

    saveUserBracket();

}

function pickFinals(side){

    if(
        selections['FINALS']
        === side
    ){

        delete selections['FINALS'];

    }else{

        selections['FINALS'] = side;

    }

    renderBracket();

    saveUserBracket();

}

// ==================== 重置 ====================

function resetBracket(){

    if(
        !confirm(
            '确定清空所有预测吗？'
        )
    ){
        return;
    }

    selections = {};

    renderBracket();

    saveUserBracket();

}

// ==================== 进度 ====================

function updateProgress(){

    const total = 15;

    const done =
    Object.keys(selections)
    .length;

    document.getElementById(
        'progress-num'
    ).innerText = done;

    document.getElementById(
        'progress-bar-fill'
    ).style.width =
        (done/total*100) + '%';

}

// ==================== TAB ====================

function switchTab(event,tab){

    document
        .querySelectorAll('.tab')
        .forEach(t=>
            t.classList.remove('active')
        );

    event.target.classList.add(
        'active'
    );

    document
        .querySelectorAll('.section')
        .forEach(s=>
            s.classList.remove('active')
        );

    document.getElementById(
        'sec-' + tab
    ).classList.add('active');

}

// ==================== 排名 ====================

function renderStandings(
    teams,
    tableId
){

    const tbl =
    document.getElementById(
        tableId
    );

    let html = `
    <thead>
    <tr>
        <th>排名</th>
        <th>球队</th>
        <th>战绩</th>
        <th>胜率</th>
    </tr>
    </thead>
    <tbody>
    `;

    teams.forEach(t=>{

        let rankCls =
        'rank-badge ';

        if(t.seed <= 6){

            rankCls += 'r1-6';

        }else if(t.seed <= 10){

            rankCls += 'r7-10';

        }else{

            rankCls += 'r11-15';

        }

        if(t.seed === 7){

            html += `
            <tr class="divider-playin">
                <td colspan="4">
                    附加赛区域 7-10名
                </td>
            </tr>
            `;
        }

        if(t.seed === 11){

            html += `
            <tr class="divider-out">
                <td colspan="4">
                    无缘季后赛
                </td>
            </tr>
            `;
        }

        html += `
        <tr>

            <td>
                <span class="${rankCls}">
                    ${t.seed}
                </span>
            </td>

            <td>

                <div class="team-info">

                    <span
                        class="team-dot-sm"
                        style="background:${t.color}"
                    ></span>

                    ${t.name}

                </div>

            </td>

            <td style="color:#aaa">
                ${t.w}-${t.l}
            </td>

            <td class="pct">
                ${t.pct}
            </td>

        </tr>
        `;

    });

    html += `</tbody>`;

    tbl.innerHTML = html;

}

</script>
