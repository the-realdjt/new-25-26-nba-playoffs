<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NBA 2025-26 季后赛预测</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #0a0a0f; color: #fff; min-height: 100vh; }
        .container { max-width: 1800px; margin: 0 auto; padding: 20px; }
        header { text-align: center; padding: 20px 0; border-bottom: 1px solid #333; }
        h1 { font-size: 1.8rem; margin-bottom: 10px; }
        .tabs { display: flex; justify-content: center; gap: 10px; margin: 20px 0; }
        .tab { padding: 10px 20px; border: 1px solid #333; background: transparent; color: #fff; cursor: pointer; border-radius: 5px; }
        .tab.active { background: #c9082a; border-color: #c9082a; }
        .section { display: none; }
        .section.active { display: block; }
        .bracket-wrapper { overflow-x: auto; padding: 20px 0; }
        .bracket-main { display: flex; align-items: center; justify-content: center; min-width: 1200px; gap: 20px; }
        .conf-side { display: flex; align-items: center; }
        .conf-side.east { flex-direction: row-reverse; }
        .conf-label { writing-mode: vertical-rl; text-orientation: mixed; padding: 10px; background: #c9082a; border-radius: 5px; margin: 0 10px; }
        .conf-side.east .conf-label { background: #17408b; }
        .round-col { display: flex; flex-direction: column; gap: 15px; }
        .matchup { width: 200px; background: #1a1a2e; border: 1px solid #333; border-radius: 8px; overflow: hidden; }
        .team-row { padding: 10px; cursor: pointer; border-bottom: 1px solid #333; }
        .team-row:last-child { border-bottom: none; }
        .team-row.selected { background: rgba(201,8,42,0.2); border-left: 3px solid #c9082a; }
        .finals-zone { display: flex; flex-direction: column; align-items: center; }
        .finals-card { width: 220px; background: #1a1a2e; border: 2px solid #ffd700; border-radius: 10px; overflow: hidden; }
        .finals-header { padding: 10px; background: #ffd700; color: #000; text-align: center; font-weight: bold; }
        .finals-team { padding: 15px; cursor: pointer; border-bottom: 1px solid #333; }
        .finals-team:last-child { border-bottom: none; }
        .finals-team.selected { background: rgba(255,215,0,0.2); border-left: 3px solid #ffd700; }
        .reset-btn { display: block; margin: 20px auto; padding: 10px 30px; background: transparent; border: 1px solid #333; color: #fff; border-radius: 5px; cursor: pointer; }
        .reset-btn:hover { border-color: #c9082a; }
        .standings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .conf-table { background: #1a1a2e; border-radius: 10px; overflow: hidden; border: 1px solid #333; }
        .conf-table-header { padding: 15px; text-align: center; font-weight: bold; }
        .conf-table-header.west { background: #c9082a; }
        .conf-table-header.east { background: #17408b; }
        .s-table { width: 100%; border-collapse: collapse; }
        .s-table th, .s-table td { padding: 10px; text-align: left; border-bottom: 1px solid #333; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>NBA 2025-26 季后赛预测</h1>
            <button class="reset-btn" onclick="logout()">🚪 退出登录</button>
        </header>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('bracket')">季后赛对阵图</button>
            <button class="tab" onclick="switchTab('standings')">常规赛排名</button>
        </div>

        <div class="section active" id="sec-bracket">
            <div class="bracket-wrapper">
                <div class="bracket-main" id="bracket-main"></div>
            </div>
            <button class="reset-btn" onclick="resetBracket()">🔄 重置所有预测</button>
        </div>

        <div class="section" id="sec-standings">
            <div class="standings-grid">
                <div class="conf-table">
                    <div class="conf-table-header west">西部联盟 WEST</div>
                    <table class="s-table" id="west-table"></table>
                </div>
                <div class="conf-table">
                    <div class="conf-table-header east">东部联盟 EAST</div>
                    <table class="s-table" id="east-table"></table>
                </div>
            </div>
        </div>
    </div>

<script>
// 你的密钥（保持不变）
const SUPABASE_URL = "https://mqgmvpwweqviwyccjmdj.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1xZ212cHd3ZXF2aXd5Y2NqbWRqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyODk2NjEsImV4cCI6MjA5Mzg2NTY2MX0.pV6r_eG865nEJv83-p-0bWkW3H5_jgowAsjgH1s7rAU";
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentUser = null;
let selections = {};

// 页面加载：先检查登录，再渲染（绝对不会空白）
document.addEventListener('DOMContentLoaded', async () => {
    // 1. 检查登录
    const { data: { user } } = await supabase.auth.getUser();
    if (!user) {
        location.href = "index.html";
        return;
    }
    currentUser = user;

    // 2. 加载历史预测
    await loadBracket();

    // 3. 强制渲染对阵图（关键：不管数据有没有，先渲染基础结构）
    renderBracket();

    // 4. 渲染常规赛排名
    renderStandings();
});

// 退出登录
async function logout() {
    await supabase.auth.signOut();
    location.href = "index.html";
}

// 从数据库加载预测
async function loadBracket() {
    const { data } = await supabase
        .from("user_brackets")
        .select("selections")
        .eq("user_id", currentUser.id)
        .maybeSingle();
    selections = data?.selections ? JSON.parse(data.selections) : {};
}

// 保存预测到数据库
async function saveBracket() {
    await supabase
        .from("user_brackets")
        .upsert({ user_id: currentUser.id, selections: JSON.stringify(selections) });
}

// 球队数据（只保留前8，精简）
const west8 = [
    { seed:1, name:'雷霆' }, { seed:2, name:'马刺' }, { seed:3, name:'掘金' }, { seed:4, name:'湖人' },
    { seed:5, name:'火箭' }, { seed:6, name:'森林狼' }, { seed:7, name:'开拓者' }, { seed:8, name:'太阳' }
];
const east8 = [
    { seed:1, name:'活塞' }, { seed:2, name:'凯尔特人' }, { seed:3, name:'尼克斯' }, { seed:4, name:'骑士' },
    { seed:5, name:'猛龙' }, { seed:6, name:'老鹰' }, { seed:7, name:'76人' }, { seed:8, name:'魔术' }
];

// 生成唯一ID
const mid = (conf, round, m) => `${conf}R${round}M${m}`;

// 获取某一轮对阵（精简逻辑，保证能返回数据）
function getMatchups(conf, round) {
    const t = conf === 'W' ? west8 : east8;
    if (round === 1) return [[t[0],t[7]], [t[1],t[6]], [t[2],t[5]], [t[3],t[4]]];
    const prev = getMatchups(conf, round-1);
    if (!prev) return [];
    const winners = prev.map((_,i) => selections[mid(conf,round-1,i)] === 'H' ? prev[i][0] : prev[i][1]);
    return winners.length ? [winners.slice(0,2), winners.slice(2,4)].filter(x=>x.length) : [];
}

// 渲染对阵图（核心：强制渲染，不会空白）
function renderBracket() {
    const el = document.getElementById('bracket-main');
    let html = '';

    // 西部
    html += '<div class="conf-side west"><div class="conf-label west">西部</div>';
    for (let r=1; r<=3; r++) {
        html += `<div class="round-col">`;
        const ms = getMatchups('W', r);
        const cnt = r===1 ? 4 : r===2 ? 2 : 1;
        for (let i=0; i<cnt; i++) {
            const id = mid('W',r,i);
            const pair = ms[i] || [{name:'?'},{name:'?'}];
            html += `<div class="matchup">
                <div class="team-row ${selections[id]==='H'?'selected':''}" onclick="pick('${id}','H')">${pair[0].name}</div>
                <div class="team-row ${selections[id]==='L'?'selected':''}" onclick="pick('${id}','L')">${pair[1].name}</div>
            </div>`;
        }
        html += `</div>`;
    }
    html += '</div>';

    // 总决赛
    const wFin = getMatchups('W',3)[0] || [{name:'西部胜者'},{name:'西部胜者'}];
    const eFin = getMatchups('E',3)[0] || [{name:'东部胜者'},{name:'东部胜者'}];
    const finW = selections['W3M0']==='H' ? wFin[0] : wFin[1];
    const finE = selections['E3M0']==='H' ? eFin[0] : eFin[1];
    html += `<div class="finals-zone"><div class="finals-card">
        <div class="finals-header">总决赛</div>
        <div class="finals-team ${selections['FINALS']==='W'?'selected':''}" onclick="pickFinals('W')">${finW.name}</div>
        <div class="finals-team ${selections['FINALS']==='E'?'selected':''}" onclick="pickFinals('E')">${finE.name}</div>
    </div></div>`;

    // 东部
    html += '<div class="conf-side east"><div class="conf-label east">东部</div>';
    for (let r=1; r<=3; r++) {
        html += `<div class="round-col">`;
        const ms = getMatchups('E', r);
        const cnt = r===1 ? 4 : r===2 ? 2 : 1;
        for (let i=0; i<cnt; i++) {
            const id = mid('E',r,i);
            const pair = ms[i] || [{name:'?'},{name:'?'}];
            html += `<div class="matchup">
                <div class="team-row ${selections[id]==='H'?'selected':''}" onclick="pick('${id}','H')">${pair[0].name}</div>
                <div class="team-row ${selections[id]==='L'?'selected':''}" onclick="pick('${id}','L')">${pair[1].name}</div>
            </div>`;
        }
        html += `</div>`;
    }
    html += '</div>';

    el.innerHTML = html;
}

// 选择球队（选完自动保存）
function pick(id, side) {
    selections[id] = side;
    renderBracket();
    saveBracket();
}

// 选择总冠军
function pickFinals(side) {
    selections['FINALS'] = side;
    renderBracket();
    saveBracket();
}

// 重置预测
function resetBracket() {
    if (confirm('确定重置所有预测？')) {
        selections = {};
        renderBracket();
        saveBracket();
    }
}

// 切换标签
function switchTab(tab) {
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    document.querySelector(`.tab[onclick="switchTab('${tab}')"]`).classList.add('active');
    document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
    document.getElementById(`sec-${tab}`).classList.add('active');
}

// 渲染常规赛排名（精简）
function renderStandings() {
    const westHtml = west8.map(t=>`<tr><td>${t.seed}</td><td>${t.name}</td></tr>`).join('');
    const eastHtml = east8.map(t=>`<tr><td>${t.seed}</td><td>${t.name}</td></tr>`).join('');
    document.getElementById('west-table').innerHTML = `<thead><tr><th>排名</th><th>球队</th></tr></thead><tbody>${westHtml}</tbody>`;
    document.getElementById('east-table').innerHTML = `<thead><tr><th>排名</th><th>球队</th></tr></thead><tbody>${eastHtml}</tbody>`;
}
</script>
</body>
</html>
